    {key:"a5",name:"A5 — Prediction Interdiction",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action when a creature within sight rolls a STR, CON, or DEX saving throw or a mental saving throw against a visible effect, a Seer may impose a curse by informing their allies of the creatures next move. The creature immediately fails the saving throw regardless of roll (this ability supersedes a Natural 20)."},
    {key:"a6",name:"A6 — Apex Calculation",desc:"(1 Invested Action) (4 Burnout Points) As an Invested Action a Seer may peer into the future and allow themselves to use the best possible string of action. During that round, the casting Seer may treat all d20 rolls below [10 + ISM] as [10 + ISM].\"\nA creature benefiting from a Seer's version of the Foresight spell may also be a target of this ability."}
  ]},
  arcana_immunity_major:{name:"Arcana Immunity (Major)",key:"arcana_immunity_major",icon:"🛑",rank:"#5 Most Powerful",passive:"- Major Blockers gain the full abilities of the Arcana Countering (Minor) Signet\n- Major Blockers deal doubled damage to all Majors\n- Major Blockers are aware of a Majors' presence provided they channel from the Sky.",upgrades:[
    {key:"a1",name:"A1 — Anti-Major",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Major Blocker may immediately shred an Major Arcana cast being cast and nullify its casting."}
  ]},
  lightning:{name:"Lightning",key:"lightning",icon:"⚡",rank:"#6 Most Powerful",passive:"- Skyhearts have all Lightning-Based damage dice converted to d20s\n- Skyhearts have immunity to Lightning, Thunder & Cold Damage\n- Lightning damage dealt by Skyhearts bypasses all possible damage reduction and cannot be transferred\n- Creatures that touch Skyhearts (i.e. a grapple), are dealt Fire Damage equal to half the amount of Burnout Points the Skyheart has consumed. Skyhearts deal an additional amount of fire damage with unarmed strikes and unarmed attacks (with touch) equal to 1/3 of the Burnout Points the Wielder has consumed.",upgrades:[
    {key:"a1",name:"A1 — Lightning Bolt",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, a Skyheart may conjure a bolt of pure energy in the form of lightning and send it towards a target within sight. The Skyheart must make an attack roll (due to this being a connected bolt, this attack roll is technically not considered ranged), using a +{0} bonus to hit, selecting Burnout Points before determining the outcome of the attack. This energy bolt deals damage equal to the amount of [Burnout Points selected * 2 in d20s] (i.e. a Skyheart utilizing 10 Burnout Points would deal 20d20 damage). Additionally, a creature hit by this energy bolt is paralyzed until the end of the Skyhearts' next turn.\n[1 Point] Lightning Bolt's to hit bonus increases by +1\n[10 Points] Lightning Bolt's energy may now split to an additional target within sight"},
    {key:"a2",name:"A2 — Lightning Strike",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, a Skyheart may cause energy to strike at a point within sight in the form of a lightning bolt. All creatures within a {5} foot radius of the strike zone must make a DEX saving throw or take damage equal to the amount of [Burnout Points selected * 2 in d20s]. A creature that fails this saving throw is also paralyzed until the end of the Skyhearts' next turn. Success on this save halves the damage dealt and prevents the paralyzed condition.\n[5 Points] The radius of Lightning Strike increases by 5 feet"}
  ]},
  shadow:{name:"Shadow",key:"shadow",icon:"🌑",rank:"#7 Most Powerful",passive:"- Shadowhearts have their Armor Class doubled while in dim light or darkness.\n- Shadowhearts always have the Shadow Blade, Shadow of Moil, Pass without Trace, Maddening Darkness and Darkness spells prepared and can cast them at will and ignoring concentration requirements.\n- Shadowhearts immediately have their hitpoints reset to 1 hitpoint when dropping to or below 0 hit points while in dim light or shadow.\n- Shadowhearts cannot lose concentration on shields while in dim light or darkness.\n-Necrotic damage dealt using the Shadow Signet bypasses Resistances and Immunities.",upgrades:[
    {key:"a1",name:"A1 — Grasp from the Shadows",desc:"(1 Invested Action) (1 Burnout Point / Target) As an Invested Action, an Shadowheart may cause the shadows of all creatures of their choice within sight to animate and turn on their owners, striking them. All struck creatures take Necrotic damage equal to [ISM * d8s] and immediately fall prone. Damage taken from this ability reduces the attacked creatures MAX HP by the damage received.\nWhen used against a Signet, this ability nullifies the signet attack while still being able to attack other creatures as specified."},
    {key:"a2",name:"A2 — Veil of Shadows",desc:"(1 Invested Action) (5 Burnout Points / Turn) As an Invested Action, an Shadowheart may cause their own shadow to expand exponentially, duplicating the casting of the Maddening Darkness spell within its {60} foot radius. All creatures of the Shadowheart's choice inside this darkness gain armor class equal to the Shadowheart's ISM and can see through this darkness while all other creatures have the same amount removed from their AC and are blinded by the darkness provided they do not have true or blindsight.\n[3 Points] Veil of Shadows' emanation radius increases by 5 feet."},
    {key:"a3",name:"A3 — Shroud of Shadows",desc:"(1 Invested Action) (8 Burnout Points) As an Invested Action, an Shadowheart may cause shadows to shroud a creature of their choice within sight (can be themselves). Until dispelled by the casting Shadowheart, the creature gains a bonus to all ability checks & saving throws equal to the Shadowheart's ISM.\n[12 Points] Shroud of Shadows may affect an additional creature."},
    {key:"a4",name:"A4 — Arms of the Darkest Night",desc:"(1 Invested Action / Turn) (5 Burnout Points / Turn) As an Invested Action every turn, an Shadowheart may cause their own shadow to animate and form an amount of shadowy limbs equal to their ISM around themselves. During their turn, these arms may be used to attack creatures within 10 feet, each dealing [ISM * d6s] Necrotic damage, which reduces the hit creature's maximum hitpoints. This special attack sequence is used by replacing one of the Shadowheart's existing attack actions or a bonus action."},
    {key:"a5",name:"A5 — Shade Double",desc:"(5 Invested Actions) (16 Burnout Points) As 5 Invested Actions, a Shadowheart may create a perfect replica of their own Shadow, which animates at a location within dim light or darkness within sight. If this Shadow ever enters a radius of bright light, the Shadow vanishes. This shadowy replica shares the exact same stat block as the animating Shadowheart (But does NOT have Invested Actions), but has its hit points set to  [10 * ISM]. Whenever the animating Shadowheart of the double is being targeted by an attack, the Shadowheart may utilize an Invested Action (without reaction) to swap positions with its duplicate. A Shadowheart may create up to 3 duplicates that exist simultaneously."},
    {key:"a6",name:"A6 — Shadow Necklace",desc:"(1 Invested Action) (8 Burnout Points) As an Invested Action, a Shadowheart may animate the shadow of a creature within sight and cause it to wrap around their throats, constricting immediately. The targeted creature takes Necrotic damage equal to [ (10 - CON Mod) * 2 * d8s] and falls prone if their CON Mod is less than 5 at the start of their turn. This shadow persists until it is killed or the creature is dead. The shadow has armor class equal to the animating Shadowheart and cannot be affected by Area of Effect abilities. If a creature attempting to destroy the shadow misses its armor class, it hits the creature it is choking instead."},
    {key:"a7",name:"A7 — Never-Ending Darkness",desc:"(1 Invested Action) (Burnout Points Vary) While witnessing another creature receive Healing, a Shadowheart may utilize an Invested Action to immediately counteract its effects. The Shadowheart may choose to expend any amount of Burnout Points, rolling a d12 for each expended point and subtracting that amount from the healing applied. If all applied healing is nullified, the Shadowheart may roll all utilized prevention dice and deal Necrotic damage to the creature instead. This Necrotic damage reduces the attacked creatures MAX HP by the damage recieved."}
  ]},
  chronology:{name:"Chronology",key:"chronology",icon:"⌛",rank:"Extraordinary",passive:"- Chronologists have doubled uses of all limited use abilities (i.e. Sorcery Points, Luck Points, etc)\n- Chronologists always go first during initiative",upgrades:[
    {key:"a1",name:"A1 — Conversion of Time",desc:"(1 Invested Action) (Burnout Costs Vary) As an Invested Action, a Chronologist may cause a willing creature they touch or themselves to gain action economy at the following costs:\n- 7 Points: The creature gains an Action\n- 4 Points: The creature gains a Bonus Action\n- 1 Point: The creature gains a Reaction"},
    {key:"a2",name:"A2 — Steal Time",desc:"(1 Invested Action) (Burnout Costs Vary) As an Invested Action, a Chronologist may touch an unwilling creature to steal action economy at the same cost as their A1 ability. The creature makes an INV save, the action economy being transferred to the Chronologist upon failure while the ability fails on success."},
    {key:"a3",name:"A3 — Stop Time",desc:"(1 Invested Action) (5 Burnout Points / Round) As an Invested Action, a Chronologist may replicate the effects of the Time Stop spell with the following added benefits:\n- This version of the spell lasts so long as the Chronologist maintains their Burnout spending\n- This version of the spell allows the Chronologist to select other creatures of their choice within its radius to also gain the benefits of the spell"},
    {key:"a4",name:"A4 — Don't wanna deal w/ allat tbh",desc:"(2 Invested Actions) (10 Burnout Points) As 2 Invested Actions, a Chronologist may cause all creatures (including themselves and allies) in an active initiative to be unable to use either Actions, Bonus Actions, Reactions or Invested Actions (they choose one) until the end of their next turn."},
    {key:"a5",name:"A5 — Mods, Ban this guy",desc:"(2 Invested Actions) (15 Burnout Points) As 2 Invested Actions, a Chronologist may force a creature they touch to make a INV save or lose their next turn completely (all action economy)."}
  ]},
  countering_signets:{name:"Countering Signets",key:"countering_signets",icon:"🚫",rank:"Extraordinary",passive:"- While channeling, Signet Blockers are aware of all attempted signet interactions with themselves or nearby creatures and may prevent the interaction using this A1 ability, if they wish.\n- Signet blocks are inherently immune to all negative signet effects",upgrades:[
    {key:"a1",name:"A1 — Anti-Signet",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Signet Blocker may gain 3 \"Countering Points\" (the same as the Blocker Signet, but able to nullify NON-VISIBLE signet effects), which may be used to nullify any signet action as a Free Action.\n[5 Points] Anti-Signet grants an additional Counter Point per cast"},
    {key:"a2",name:"A2 — Anti-Signet Field",desc:"(1 Invested Action / Turn) (3 Burnout Points / Round) As an Invested Action, a Signet Block may create a Anti-Signet field within a {60} foot emanation from their position (following them as they move). While in this field, all Signet based magic ceases to function (including passive abilities).\n[3 Points] Anti-Signet Fields' emanation range increases by 5 feet."}
  ]},
  battle_precognition:{name:"Battle Precognition",key:"battle_precognition",icon:"⚔",rank:"Extraordinary",passive:"- Tacticians (the name of those who have this signet) are selectively given visions when their power is channelled by the sky and fate recognizes a future conflict. During the day, so long as they are actively grounded, Tacticians may stumble into a vision of a future battle, during which they briefly fall unconscious physically. If they are attacked physically during such a vision, the vision automatically ends and the Tactician returns to consciousness.\n- Tacticians have an inherent sense of battlefield mechanics during a combat. If any environmental changes or specializations exist on a battlefield, the Tactician knows of the environmental effects and how to utilize them.\n- When grounded, Tacticians cannot lose regular non-shielding concentration (since grounding is a pseudo concentration roll but not concentration, this means someone would need to break through your grounding before being able to affect your concentration) (NOTE: This passive does NOT protect your shields)\n- Tacticians gain 1 resistance of their choice before every combat of which they have had a vision (the resistance only applies during combat and ends afterwards)\n- Tacticians gain a +3 bonus to their WIS score, to a maximum of 26.",upgrades:[
    {key:"a1",name:"A1 — Foresight (No Invested Actions)",desc:"(No Invested Actions) (1 Burnout Point / Turn) When a Tactician participates in a combat they've already foreseen in a vision, they may communicate future events and enemy movements to their allies either by shouting or via telepathy. All allied creatures that receive this communication from a Tactician gain the following benefits during Initiative, provided the Tactician themselves are not Incapacitated, Silenced or subject to other methods of Crowd-Control.\n-Advantage on all Saving Throws\n-Advantage on all Attack Rolls\n-Advantage on all Ability Checks\n-Advantage on all Skill Checks\n-The channelling Tactician may extend their Battle-rond Dodge ability to a creature under their command.\nThis ability is constrained by common sense. If a creature cannot hear the Tactician's instructions, the ability does not function. If multiple Tacticians participate in the same battle, Foresight does not apply to either side provided the Tacticians are fighting against each other. If a second Tactician fights alongside the first, allies instead gain the following additional benefits:\n-A +5 Bonus to all Saving Throws, Attack Rolls, Ability Checks, and Skill Checks\n-A +3 bonus to Armor Class\n(Additional Tacticians multiply this benefit further)\n[15 Points] Creatures under your Foresight instruction deal \"True Damage\" when scoring a critical hit with a natural 20.\n-> True Damage is a unique damage type to which you cannot be resistant or immune and which cannot be transferred or reduced.\n[15 Points] (Contingent you unlock the previous upgrade] Creatures under your Foresight instruction gain \"Supercritical\" benefits. When scoring a critical hit with a natural 20, the True Damage dealt also reduces the targets' maximum hitpoints by half the True Damage dealt. This maximum reduction cannot exceed 5 * the target's PB on a single strike but can stack."},
    {key:"a2",name:"A2 — Battle-rond Dodge",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Tactician may attempt to foresee a future attack (meaning an attack roll OR a signet attack) and dodge. [Unlike regular signets, using this Invested Action specifically out of turn does not require a Reaction] Roll a D6. On a result equal to 4 or greater, the attack misses. On a 2 or 3, the attack deals half damage instead. Alternatively, a Tactician may use this ability to reroll a saving throw with a bonus equal to their ISM. They must use the result of this new roll."},
    {key:"a3",name:"A3 — Battle-rond Offensive",desc:"(1 Invested Action) (1 Burnout Points) As an Invested Action, a Tactician may attempt to foresee the outcome of their future attack, giving them a greater chance to land that blow. Until the start of the tactician's next turn, they gain an {1} additional critical digit. This ability cannot be stacked.\n[5 Points] Battle-rond Offensive grants an additional critical digit [Max: 2]"},
    {key:"a4",name:"A4 — Combat Prowess",desc:"(1+2 Invested Actions) (3+7 Burnout Points) This ability is made up of 2 \"parts\"\n- As an Invested Action, a Tactician may attempt to determine if it is strategically sound to activate their Combat Prowess ability to determine enemy movements. The DM grants the Tactician advice on this matter with a scale from 1 to 6.\n- As 3 Invested Actions, a Tactician may attempt to see the enemies' planned moves during the next round of combat until the start of their next turn. When this ability is used, the player's outline their plans for their turns and the DM will outline how the enemies will react. This ability is situation and can be adjusted by the Tactician with DM approval."},
    {key:"a5",name:"A5 — Well-Prepared Tactician",desc:"(2 Invested Actions) (4 Burnout Points) This ability requires a Pen and Paper to use. Be warned.\nAs 2 Invested Actions, a Tactician may attempt to masterfully predict an opponents next moves. This ability may NOT be used if Combat Prowess has been used to predict opponent movements. The Tactician then writes down (using Pen and Paper) an Action, Bonus Action, Reaction or Invested Action before confirming to the DM that the sequence has been written. (If an NPC uses this ability, the DM confirms to players). This sequence must include the creature being predicted, target, and the actions used in detail (i.e. Attack using Spear) (You do not need to give item names, but cannot simply specify \"2 attack actions\")\nExample Prediction: Grigory Snow will use his Bracelets as an Action on [NPC]\nSecond Example: Laura Thelson will use their Invested Action to cast [A1] of their Fire Signet targeting Tuong Liu Kim\nThird Example: Lara Thelson will cast Shield using their Reaction against an attack by [NPC]\nNOTE: Almost always, a target will be required. If the spell is of Area of Effect, you must predict ONE target of the spell.\nIf a prediction is successful, the action is nullified and action economy voided."},
    {key:"a6",name:"A6 — Slippery Tactician",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action at the start of a round (No Reaction) (Cannot be applied during the First Round of Combat), a Tactician may choose when to act during that round of initiative, changing their initiative score freely. This changed score cannot be swapped to another creature and does not count as rolling (so cannot be edited using the Alert feat)"},
    {key:"a7",name:"A7 — WHAT ARE YOU AIMIN AT?",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action, a Tactician may mark a creature of their choice within sight by catcalling insults whenever they miss an attack roll. Until the start of the Tactician's next turn, every time the marked creature misses an attack roll, they take psychic damage equal to [2 * ISM * d8s]. The marked creature is aware of this effect."}
  ]},
  memory_erasure:{name:"Memory Erasure",key:"memory_erasure",icon:"🧠",rank:"Extraordinary",passive:"- Wipers have a firm grasp of their memories and thoughts. Due to this, Memory Modification and Erasure effects cannot effect Wipers\n- Wipers maintain active shields at all times they wish, even when unconscious. These shields cannot be broken unless  Palladium is used.",upgrades:[
    {key:"a1",name:"A1 — No More Memory Lane",desc:"(1 Invested Action) (1 Burnout Point / Minute) As an Invested Action while in physical contact with a creature without shields, a Wiper may Erase memories from a recent period of time. A Wiper may only select a period of time within {24} hours using this ability, the memories from that period of time becoming completely Erased.\n[3 Points] No More Memory Lane may effect memories from 1 hour further back in time."},
    {key:"a2",name:"A2 — No More Skills",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action while in physical contact with a creature without shields, a Wiper may utilize their skills to temporary give a creature amnesia surrounding a talent or technique of their choice. This ability may be used to affect ability checks, saving throws, to hit modifiers, spell save DCs, spell attack modifiers, (and basically everything else on a character sheet that has a + with a number behind it). A Wiper may expend burnout points equal to the bonus the creature they are attempting to wipe currently has on the intended modifier and completely remove that modifier until the creature's next long rest, at which point they recall their knowledge of the skill.\nExample: A Wiper may attempt to wipe a creature with +11 sleight of hand with 11 burnout points and the creature is left with +0 sleight of hand until their next long rest."}
  ]},
  green:{name:"Green",key:"green",icon:"🌿",rank:"Extraordinary",passive:"- Wielders of the Green Signet may select 1 set of passive abilities from one of the elemental signets of their choice. They may switch between these passives as an Action or Bonus Action.\n- Wielders of the Green Signet gain the elemental damage die increase of all the elemental passives, even if they do not have that signet's passives selected. Additionally, the Green signet further bolsters Elemental damage die by 1 tier.\n- The Green Signet does not have unique active abilities; instead, they may use any active abilities from any Elemental signets. Investiture points expended to upgrade any Elemental Signet by a Green Signet wielder may also be distributed into other elemental signets equally. (i.e. spending 5 points in the fire signet gives you 5 points to spend in all other elementals.)",upgrades:[]},
  flash:{name:"Flash",key:"flash",icon:"💨",rank:"Extraordinary",passive:"- Flashes gain a bonus to movement speed equal to [10 * ISM]. While within the bounds of rainy weather (or a Stormwarden's rain effects) or underwater, Flashes gain a swimming speed equal to 5 times their movement speed. Without these weather based effects, Flashes have a swimming speed equal to their movement speed.\n- Flashes have immunity to Lightning and Thunder damage & resistance to Cold damage.\n-  Flashes gain a bonus to damage dealt with melee attacks equal to [3 * ISM] in Lightning damage",upgrades:[
    {key:"a1",name:"A1 — Flash",desc:"(1 Invested Action) (1+1 Burnout Point(s) (Possibly 1 Burnout / Round) As an Invested Action and provided there is some method of conductivity able to be used, a Flash may transform their body (taking their equipment with them) into an electrical current and streak through the conductive material. (Example: If the ground is made of conductive metal, if it's raining, if the environment has water). When traveling in this way, Flashes utilize their swimming speeds.\nImmediately after this travel, Flashes may expend an additional Burnout Point to shift back into their regular form, gaining an attack as a free action against any creature within melee range. When shifting back to their regular forms, if there is not enough space for the form to take place, they instead reform at the closest location with enough space instead.\nWhile a Flash's body is an Electrical current, they are immune to all damage, conditions and other effects. If a Flash chooses to remain as an electrical current without reforming, they may do so indefinitely provided they are still within some sort of conductive material but expend 1 additional burnout point per round they remain in this form.\nNOTE: While in Flash Form, Emanations from a Flash still apply around them."},
    {key:"a2",name:"A2 — Electrifying Smite",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action when hitting a creature with an attack roll using the free attack granted by their A1 reformation, a Flash may infuse their attack with terrifying electrical force. Creatures hit by the attack must roll a CON saving throw or the next attack that hits them is a critical hit. This ability also adds lightning damage equal to [ISM * d8s] to the base attack"},
    {key:"a3",name:"A3 — Lightning Rod",desc:"(1 Invested Action) (1 Burnout Point / Transference) As an Invested Action which must be specified at the start of their turn, a Flash may create a field of energy attraction around themselves, allowing them to redirect any Lightning, Cold or Thunder damage being dealt within a {30} foot radius to themselves using a Burnout Point.\nReminder: Flashes are immune to Lightning and Thunder Damage and have Resistance to Cold damage.\n[3 Points] Lightning Rod's radius increases by 5 feet"},
    {key:"a4",name:"A4 — Static Electricity",desc:"(1 Invested Action / Turn) (5 Burnout Points / Turn) As an Invested Action, a Flash may partially transform their body into an electrical current while maintaining their normal form, causing pulsing electric currents to move across their skin. While partially transformed in this way, a Flash gains the following benefits:\n- Resistance to Force, Fire and (Magical) Bludgeoning damage\n- When taking damage from Melee attacks via a conductive source, the dealt damage is also deflected to the attacker in lightning damage (The Flash still takes damage themselves)"}
  ]},
  distance:{name:"Distance",key:"distance",icon:"🔭",rank:"Extraordinary",passive:"- Stretchers have a deeper understanding of distances and their manipulation. They always have the Teleport spell prepared can must not roll for Mishaps when casting the spell. Additionally, they may transport Gargantuan creatures and objects using the spell.\n- Every time a Stretcher uses Teleportation (Signet or regular), they gain an additional SIMPLE action (i.e. can only make 1 attack with it)\n- Stretchers gain an additional [5 * ISM] feet of range in all abilities that require it. (Example: A Stretcher with a +5 ISM may target a creature 30 feet away with an unarmed strike)",upgrades:[
    {key:"a1",name:"A1 — Flicker Step",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action during Initiative, a Stretcher may grant themselves a Teleportation Point. Teleportation Points may be used by consuming a Burnout Point (Even out of turn), to teleport up to [25 * ISM] feet. If a creature was making an attack against the Stretcher, the attack misses unless otherwise bypassed.\nStretchers may have an amount of Teleportation Points at a time equal to their {PB}.\n[8 Points] Stretchers may maintain an additional Teleportation Point."},
    {key:"a2",name:"A2 — Condense Distance",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Stretcher may magically manipulate distance for a creature of their choice making a melee attack (can be themselves). Then, they may select another creature within sight and cause the first creature's attack to hit the second."},
    {key:"a3",name:"A3 — Infinitesimal",desc:"(1 Invested Action) (8 Burnout Points / Turn) As an Invested Action, a Stretcher may magically manipulate all distance within a {60} foot emanation originating from themselves. All creatures of the Stretcher's choice within the zone must expend 5 feet of movement to move a single square (rounding down unless a multiple of 5) while all other creatures need only expend a foot of movement to move 5 feet.\n[1 Point] Infinitesimal's emanation range increases by 5 feet."},
    {key:"a4",name:"A4 — Wormhole",desc:"(1 Invested Action) (Burnout Cost According to DM Discretion) As an Invested Action, a Stretcher may magically manipulate Distance to create a wormhole that spans a {20} foot diameter. This wormhole duplicates the effects of the Teleportation Circle spell but only requires an Invested Action to create and can lead to a location of your choice, where a corresponding wormhole forms. This Wormhole may also connect with existing teleportation circle sigils, as Stretchers are aware of all such devices when using this ability. In order to connect this wormhole with another location, the Stretcher must have at least a mental image of the desired location.\n[1 Point] Wormhole's diameter increases by 5 feet"}
  ]},
  siphon_lesser:{name:"Siphon (Lesser)",key:"siphon_lesser",icon:"🔻",rank:"Rare",passive:"- Siphons have double the burnout values for their signet compared to regular signet users",upgrades:[
    {key:"a1",name:"A1 — Transference of Investiture",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, Siphons may transfer up to {10} Burnout points between a willing creature they touch and another willing creature they touch (or the Siphon can count themselves as one of the creatures). If the Siphon attempts to transfer points to or from an unwilling creature, they must be grappling the creature with their hands and the creature must make an INV save against the Siphon's save DC. This ability cannot cause an unwilling creature to move past the High Burnout threshold.\n[1 Point] Transference of Investiture may transfer an additional burnout Point"}
  ]},
  dream_walking:{name:"Dream Walking",key:"dream_walking",icon:"💤",rank:"Rare",passive:"- Nightseers have the ability to enter a meditative half sleep trance similar to Elves when resting. During Short Rests, Nightseers gain doubled hitpoints when rolling hit die to regain hitpoints. Additionally, the time they require to complete a long rest is reduced by an amount of hours equal to their Investiture Modifier, to a maximum of 5.\n- When Nightseers gain benefits from practice or time spent during their dreams, as the effects of such benefits transfer to their physical forms (this is somewhat subject to DM opinion)",upgrades:[
    {key:"a1",name:"A1 — Drifter of Dreams",desc:"(1 Invested Action) (1 Burnout Point per minute) After entering the REM stage of sleep, a Nightseer may intune themselves with their spiritual aspect in order to enter the subconscious of others. The limbo zone that exists on the spiritual realm when Nightseers enter this Dreamwalking state manifests depending on perception of the Nightseer themselves and varies widly. When in this limbo zone, Nightseers may enter interact with the subconscious spiritual aspects of others by entering their dreams. Unless specifically allowed, creatures cannot shield during their sleep (as unconsciousness prevents concentration), so Nightseers will almost always be able to locate a creature in the spiritual realm. Creatures being influenced in their sleep by a Nightseer are not aware of this influence unless their Investiture score is greater than the Nightseers, at which point they realize something is off.\nNOTE: Other Nightseers currently Dreamwalking CAN concentrate and use shields, thus it may prove difficult or impossible to walk in the dreams of other Nightseers."},
    {key:"a2",name:"A2 — Paralyzing Reality",desc:"(1 Invested Action) (8 Burnout Points) When a creature begins to fade and return to the physical realm, a Nightseer may utilize their remaining grasp on the creatures' cognitive aspect to cause sleep paralysis. Though the creature returns to their physical form, the creature enters a state of sleep paralysis and gains the paralyzed condition for {10} turns.\n[3 Points] Paralyzing Reality paralyzes the creature for an additional turn"},
    {key:"a3",name:"A3 — Investiture of the Soul",desc:"(1 Invested Action) (Burnout Points Vary) When a creature attempts to use Invested magic during a dream, a Nightseer may attempt to transfer and target that Invested magic to the physical aspect of a creature within the dream, causing the magic to take effect on the physical realm as if the Invested Ability were used there instead of during a dream. This ability is extraordinarily taxing to use and requires careful practice to master. Burnout points are subjective to DM opinion and the effects of certain signets may be unexpected."}
  ]},
  rending:{name:"Rending",key:"rending",icon:"💥",rank:"Rare",passive:"- Renders gain a bonus equal to their ISM when rolling to bypass shields\n- Renders have advantage on d20 checks to bypass shields\n- Renders need not concentrate to maintain their shields (but still must roll saves to keep them)",upgrades:[
    {key:"a1",name:"A1 — Rend",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action when attempting to break through a creatures' shields, a Render may expend any amount of Burnout points to gain a bonus to shatter the creature's shields equal to the Burnout Points expended.\nExample: A Render making a DC 15 roll to bypass shields could just spend 15 burnout points to shatter the creatures' shield"},
    {key:"a2",name:"A2 — Unseating",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, a Render may cause a creature within without active shields to feel a mental jolt, sabotaging their ability to ground. When using the ability, a Render must expend a number of burnout points equal to the opposing creature's CON save modifier in order to unground them."},
    {key:"a3",name:"A3 — Zen",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, a Render may expend any amount of Burnout points to add as a bonus when rolling to maintain their grounding."}
  ]},
  arcana_immunity_minor:{name:"Arcana Immunity (Minor)",key:"arcana_immunity_minor",icon:"✴",rank:"Rare",passive:"- Arcana Blockers cannot be affected by any cards in the Minor Arcana (for example, this means they actually bypass the King of Wand's protection and bonus HP). There are no exceptions. (probably yet, since there's probably some stupidly specific interaction that doesn't work out)",upgrades:[]},
  countering_arcana:{name:"Countering Arcana (Minor)",key:"countering_arcana",icon:"🔮",rank:"Rare",passive:"- Arcana Wheelers take half damage from Minor-Arcana-based damage and have advantage on all Minor-Arcana based saving throws\n- Arcana Wheelers deal doubled damage to all creatures who channel from Gryphons",upgrades:[
    {key:"a1",name:"A1 — Anti Arcana (I'm SO Creative)",desc:"(I'm SO Creative) (1 Invested Action) (1 Burnout Point) As an Invested Action, an Arcana Wheeler may immediately shred an Minor Arcana cast being cast within sight and nullify its casting."},
    {key:"a2",name:"A2 — Card-Cutting",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, an Arcana Wheeler may cause any Minor-Arcana card being cast within sight to instead switch targets to a creature within the original cards' range. The amount of Burnout Points this ability expends is equal to the number of the Arcana card in its suit. (i.e: Page of Wands = 11)"}
  ]},
  storm_wielding:{name:"Storm Wielding",key:"storm_wielding",icon:"⛈",rank:"Rare",passive:"- Stormwardens always know the future natural weather cycle (for the next 7 days), even when not channeling their signet.\n- When fighting inside a zone of weather channeled by their own magic, Stormwardens gain an additional 1d8 bonus lightning damage to all their attacks (this means attacks that involve attack rolls, this does not apply to AOE (Area of effect) attacks)\n- When fighting inside a zone of weather channeled by their own magic, Stormwardens cannot be affected by difficult terrain (but other movement reduction may still apply)\nSignet note: If 2 Stormwardens attempt to affect the weather at the same time (while not bolstering each other), the Warden with more points invested into the signet gains overage.",upgrades:[
    {key:"a1",name:"A1 — Control Weather (DM's ruling for Invested Actions) (Sometimes this ability may be ruled to take Invested Actions to maintain) (Burnout subject to DM's ruling)",desc:"(DM's ruling for Invested Actions) (Sometimes this ability may be ruled to take Invested Actions to maintain) (Burnout subject to DM's ruling) You gain the ability to control the weather as if by using the Control Weather spell. However, this ability is limited by a maximum radius of 300 feet and can only be cast on a point centered on a point in sight of the Stormwarden.\nSpecial effects:\n- When a Flash wields their signet within rain created by a Stormwarden, they may use their conductive reliant abilities constantly and without limit.\n- When a Lightning wielder uses their signet while a Stormwarden channels a lightning storm in the strike vicinity, the Lightning wielder's damage dice is doubled.\n[1 Point] The Stormwarden's maximum radius increases by 50 feet"},
    {key:"a2",name:"A2 — Weather Strike",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Stormwarden may cause weather they have created or extreme natural weather (i.e. an already existing thunderstorm) to attack targets within their range. Such an attack may be elements such as a lightning strike, flying rubble, or massive hailstones. The Stormwarden may select a single target, who takes damage equal to their [INV MOD * d8s].\n[5 Points] Weather Strike may target an additional creature."},
    {key:"a3",name:"A3 — Warden of Storms",desc:"(2 Invested Actions) (3 Burnout Points) As 2 Invested Actions, a Stormwarden may create a hovering cloud of roiling thunder, which follows a creature they designate so long as the Stormwarden remains conscious and can see the creature designated. The effects of this ability mirror the Rageful Nimbus spell but does not require a reaction to activate lightning damage. Instead, applying this lightning damage consumes a Burnout point.\nReference: Rageful Nimbus: Choose a creature within range, which can be yourself. A pristine, fluffy white cloud appears above the target and follows them for the duration. If the target takes damage from a hostile creature you can see, you can use your reaction (Instead, you consume a burnout point) to make a ranged spell attack from the cloud, provided that creature is within 60 feet of the target. On a hit, the creature takes 2d8 lightning damage.\nDuration: 1 Minute (no concentration required)\nNote: The ranged spell attack roll utilizes either a Stormwarden's spell attack modifier OR your PB + INV Mod (whichever is higher). Additionally, this ability's damage is increased by 1d8 if a Stormwarden is fighting inside their own weather conditions.\n[3 Points] Warden of Storms' ranged spell attack roll gains a +1 bonus\n[5 Points] Warden of Storms' lightning damage increases by 1d8"}
  ]},
  object_summoning:{name:"Object Summoning",key:"object_summoning",icon:"📦",rank:"Rare",passive:"- Summoners gain an additional \"Use an Object\" action on each of their turns\n- Summoners gain an additional Reaction on each of their turns\n- When a Summoner teleports or moves an object with their signet, they may immediately draw, stow, or place one object they are holding without action economy cost.",upgrades:[
    {key:"a1",name:"A1 — Mine!",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Summoner may cause any object within their sight (within reason in size, can be held) to teleport into their hand(s) (provided they have a free hand) or in the hands of another creature of their choice. Alternatively, Summoners may choose to summon objects to land on the ground at any location they choose. Summoners cannot Summon objects into closed containers or areas they do not have clear line of sight into.\nNOTE: Any object in the \"equipment\" area of a character sheet can be summoned, although Armor such as Studded leather or plate is too large to summon."},
    {key:"a2",name:"A2 — Return to Sender",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Summoner may cause any projectile type attack to teleport to another point in sight. This allows Summoners to cause any projectile attack to target a new creature, but the new attack roll is rolled with a penalty equal to [10 - The Summoner's DEX], as the teleportation jars the projectile and the reoriented attack attack is difficult to aim."},
    {key:"a3",name:"A3 — Object Sense",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action, a Summoner may use their channeled energy to search out for different items nearby, even though some may not be in their line of sight or invisible. When a Summoner uses this ability, they are immediately aware of all items within a 60 foot radius and some of their properties (if an item is magical, this may require an Arcana check if the Summoner is not familiar with the item). This ability functions even if an object is being held in an extra-dimensional storage, so long as the object spiritually linking the storage space is within a 60 foot radius."},
    {key:"a4",name:"A4 — Locked and Loaded",desc:"(1 Invested Action) (10 Burnout Points) As an Invested Action, a Summoner may mark a single creature within sight with their channeled energy. During the next {turn}, every time that creature attempts to use an item (or pulls out an item), the item is immediately affected by the Summoner's A1 skill (without the Summoner having to cast this skill). A Summoner may only mark a single creature in this way.\n[3 Points] Locked and Loaded lasts an additional turn"}
  ]},
  tongues:{name:"Tongues",key:"tongues",icon:"🗣",rank:"Rare",passive:"- Drakespeakers can communicate with all dragons who can channel magic, instead of being limited to their own steeds.\n- Drakespeakers can communicate via telepathy with double the range of regular dragon bonds; allowing them to be effective messengers and translators\n- Drakespeakers are allowed inside Empyrean gatherings of sensitive natures as observers but not the council of 7.",upgrades:[
    {key:"a1",name:"A1 — Ancient Voice",desc:"(1 Invested Action) (8 Burnout Points) As an Invested Action only available at the start of their turn, a Drakespeaker can channel their energy and release an imitation of a dragon's booming roar, further enhanced by their signet's magic. All creatures within hearing range of the Drakespeaker are dealt the following effects:\n- All creatures within 5 feet of the Drakespeaker are stunned & deafened for 1 turn and take Thunder damage equal to [20 * ISM]\n- All creatures between 5 and 20 feet from the Drakespeaker must make a CON save or take Thunder damage equal to [12 * ISM] and gain the deafened condition. (Half damage & on success, but Deafen is still applied)\n- All creatures between 20 and 100 feet from the Drakespeaker must make CON save or take Thunder damage equal to [6 * ISM] and gain the deafened condition (Half damage on success, Deafen is not applied)\n- All creatures further than 100 feet from the Drakespeaker can hear the roar but need not make a save against damage."}
  ]},
  bind:{name:"Bind",key:"bind",icon:"🔗",rank:"Rare",passive:"Binders have an uncanny knowledge of the human nervous system and its intricacies. Due to this connection:\n- Binders gain an additional Reaction on each of their turns\n- Whenever a creature that is Small or larger moves within 10 feet of you while you do not have the Unconscious condition, you immediately become aware of its presence. (But not its location)",upgrades:[
    {key:"a1",name:"A1 — Nerve Strike",desc:"(2 Invested Actions) (4 Burnout Points) As an Invested Action, a Binder may attempt to constrict and jolt nerves within a human nervous system. A target within {30} feet makes either a STR or CON saving throw, becoming paralyzed for 1 turn upon failure or managing to break through the effect upon success. A creature already paralyzed may have this effect extended by 1 turn passively if the Binder expends an additional 4 burnout points at the start of the paralyzed creature's turn, at which point they must reattempt the save. Each time the STR / CON saving throw is reattempted, the creature gains an additive {-1} penalty to the roll, to a maximum of -10. Extending Nerve Strike does not expend Invested Actions.\n[1 Point] Nerve Strike's Range increases by 5 feet (Maximum of 180 feet)\n[5 Points] You increase the reattempt penalty of Nerve Strike increases. For each 5 points spent, the penalty increase per reattempt is increased by 1. (Example: Spending 10 points would mean with every reattempt the creature gains a -3 penalty to the roll, to a maximum of -10)"},
    {key:"a2",name:"A2 — Nerve Spasm",desc:"(1 Invested Action) (2 Burnout Points) As an Invested Action, a Binder may attempt to jolt the tibial nerves and impede movement of a creature. A target within {30} feet immediately has its movement speed reduced by {30} feet. If this reduction cuts the creature's movement speed to 0, the Binder may cause them to immediately falls prone. However, this movement speed reduction has its limits. A creature may expend an action on their turn to remove this reduction, or dash to double their movement speed. This reduction does NOT reduce base movement speed and instead counts as an external reduction (so if a creature with 80 feet movement has it cut by 30 then dashes, it has 130 feet of movement that turn.)\n[1 Point] Nerve Spasm's range increases by 5 feet\n[2 Points] Nerve Spasm's movement speed reduction increases by 5 feet"},
    {key:"a3",name:"A3 — Nerve Grasp",desc:"(1 Invested Actions) (3 Burnout Points) As an Invested Action, a Binder may attempt to jolt the median nerve and attempt to cause a creature to lose their grip. A target within {30} feet must make a CON or STR saving throw, or lose their grip on a weapon, grapple, object or their environment. A creature with a weapon that has the returning property is immune to this effect. If this ability is used out of turn alongside a reaction (See: Invested Action Out of Turn Rules), it may stop an attack if it causes a creature to drop a weapon mid attack. A weapon dropped in this way may be picked up for free on the creature's turn using their free interact with object or environment action (which can only be done once per turn). You may attempt to cause a creature who has just picked up a weapon to drop it again, at which point they must expend an action to retrieve it.\n[1 Point] Nerve Grasp's range increases by 5 feet"}
  ]},
  deflection:{name:"Deflection",key:"deflection",icon:"🛡",rank:"Rare",passive:"- Deflectors take half damage from all ranged attacks\n- When a Deflector successfully causes a ranged attack to miss, they gain a temporary hitpoint shield equal to the average damage that ranged attack would have dealt (without factoring in their ranged attack resistance).\n- When a Deflector successfully causes a ranged attack to miss, they may move up to half their movement (even out of turn) without triggering attacks of opportunity",upgrades:[
    {key:"a1",name:"A1 — Deflection (duh)",desc:"(duh) (1 Invested Action) (3 Burnout Points) As an Invested Action, a Deflector may cause any ranged attack to immediately miss their target regardless of roll.\n[10 Points] Deflection may deflect an additional projectile with a single use"},
    {key:"a2",name:"A2 — Deflection Field",desc:"(1 Invested Action / Turn) (8 Burnout Points / Turn) As an Invested Action, a Deflector may create a {30} foot radius deflection field within which all projectiles of their choice immediately miss their marks.\n[3 Points] Deflection Field's radius increases by 5 feet]"},
    {key:"a3",name:"A3 — Reflection",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action after causing a ranged attack to miss with either their A2 or A1 abilities, a Deflector may instead redirect that ranged attack to a creature of their choice within the original attacks' range, maintaining the original attack roll used."}
  ]},
  mending:{name:"Mending",key:"mending",icon:"💚",rank:"Rare",passive:"- Menders have an uncanny healing touch; healing provided by a mender (whether normally or via signet) bypasses maximum hitpoint reductions. Additionally, Menders gain a bonus when applying any healing equal to [3 * ISM]\n- Menders always have the Healing Word, Cure Wounds, Aid, Heal and Mass Cure Wounds spells prepared and can cast each once per long rest without expending a spell slot.",upgrades:[
    {key:"a1",name:"A1 — Mending",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, menders may channel potent healing magic and heal a creature they touch or themselves. The healing of this ability is equal to the amount of Burnout the mender wishes to consume multiplied by their [ISM * 2]. This ability may also be used to fix objects as if by the effects of the Mending cantrip but without the 1 foot limit (This alternate consumes burnout according to DM opinion)"},
    {key:"a2",name:"A2 — Healing Draft",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, menders may channel their magic into a healing potion to intensify its' potency. The healing potion gains a bonus equal to the amount of Burnout the mender wishes to expend multiplied by their ISM. This increased healing potency does not expire, and only wears off after used or the channeling dragon dies."},
    {key:"a3",name:"A3 — Bolstering Energy (Special Condition)",desc:"(Special Condition) (5 Burnout Points) When healing a creature using a spell or other magical effect (potions do not apply), a mender may activate this ability. Immediately, the healed creature gains one of the following effects:\n- {10} feet of movement, which they must use immediately\n- {1} attack\n[2 Points] Bolstering Energy's movement option gains an additional 5 feet of movement\n[16 Points] Bolstering Energy's attack option gains an additional attack"},
    {key:"a4",name:"A4 — I'll see you on the other side, Brother",desc:"(3 Invested Actions) (999 Burnout Points) As 3 Invested Actions, a mender may channel their magic through a recently dead creature who must have been dead for no more than 24 hours. Transfusing all the power they channel through their dragon, they commit to the ultimate sacrifice and revive the targeted creature with the full effects of a long rest."}
  ]},
  rifting:{name:"Rifting",key:"rifting",icon:"🌀",rank:"Rare",passive:"- Rifters gain a deeper understanding of the art of teleportation while channeling their magic, allowing all teleportation abilities used by Rifters to activate one of their Invested Skills, if they wish, without expending an Invested Action. (Example: A Rifter casting Misty Step can activate their A1 without an Invested Action)\n- NOTE: The above ability cannot be triggered by Invested abilities. Basically, a Rifter can trigger one of their abilities for free if they teleport as an Action, Bonus Action or Class feature, but you can't chain trigger the signet with itself.\n- All teleportation magic used by Rifters have their distance extended by [10 * ISM feet]. (Note: this also extends the signet itself's capabilities)\n- Rifters can cast the Misty Step spell at will and the Teleport spell once per long rest without expending a spell slot.",upgrades:[
    {key:"a1",name:"A1 — Master of Rifts",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Rifter may cause a rift to form in the physical realm and transport themselves to another location. The triggering Rifter immediately teleports up to {30} feet away from their original position. If this ability was used as a Reaction to an enemy attack, the attack misses. [Boons bypass this fact]\nAlternatively, if this ability was activated by the effects of non-signet teleportation, the triggering Rifter instead gains temporary hitpoints equal to [ISM * {5}]\n[1 Point] Master of Rift's maximum teleportation distance increases by 5 feet\n[1 Point] Master of Rift's temporary hitpoint formula increases by 1"},
    {key:"a2",name:"A2 — Dimensional Split",desc:"(2 Invested Actions) (16 Burnout Points) As 2 Invested Actions a Rifter may cause a massive rift to tear up the ground, creating a ravine into the abyss. When created, this rift is a collection of {10} 5x5 squares, given that no square intersect with other squares on more than 2 sides and are not currently occupied. Any creature that moves across these ravine squares immediately tumble into the endless abyss below, vanishing before reappearing on the square they fell into when the ravine shuts itself. Creatures who jump over these ravine squares must succeed on a DEX save in order to be successful. This ravine lasts {1} round and collapses at the end of the triggering Rifter's turn.\n[5 Points] Dimensional Split's Rift Ravine lasts an additional turn\n[2 Points] Dimensional Split's Rift Ravine can be created using an additional 5x5 square"},
    {key:"a3",name:"A3 — Rift Port",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action, a Rifter may cause a rift to form below a targeted creature within sight, teleporting them to another location within {30} feet if they fail a DEX saving throw to dodge out of the way."},
    {key:"a4",name:"A4 — Backstab",desc:"(2 Invested Actions) (4 Burnout Points) As an Invested Action when hitting a creature with an attack roll after teleportation, a Rifter may choose to add an additional [INV * D8s] force damage on top of their attack's regular damage."}
  ]},
  retrocognition:{name:"Retrocognition",key:"retrocognition",icon:"🔙",rank:"Rare",passive:"- Retrocognitians have a firm grasp of their memories and thoughts. Due to this, Memory Modification and Erasure effects cannot effect Retrocognitians\n- Retrocognitians maintain active shields at all times they wish, even when unconscious. These shields cannot be broken unless  Palladium is used.",upgrades:[
    {key:"a1",name:"A1 — Memory Lane",desc:"(1 Invested Action) (1 Burnout Point / Minute) As an Invested Action while in physical contact with a creature without shields, a Retrocognitian may enter the recent memories of a creature, seeing the world from the creature's perspective and being able to move forward and backwards in time. When viewing memories in this way, a Retrocognitian may only view memories that are no more than 1 week old, as older memories fade with time. If there is an extremely potent old memory, it is possible the Retrocognitian may be able to access it at DMs discretion. If a creature recalled an older memory during the period a Retrocognitian may access, the Retrocognitian may gain a hazy impression of that memory.\n[10 Points] Memory Lane may access 1 day further into the creature's memories"}
  ]},
  sound_seeking:{name:"Sound Seeking",key:"sound_seeking",icon:"👂",rank:"Rare",passive:"- Snitches have an uncanny sense of sound, allowing them to pick up sound up to a kilometer around them (but only if they are channeling).\n- Snitches gain advantage on Perception checks and expertise in the Perception skill",upgrades:[
    {key:"a1",name:"A1 — Sound Tuning",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Snitch may attempt to narrow their focus on a single conversation ongoing within their hearing radius. Rolling a Perception check, the snitch receives sound from the conversation appropriate to the result, likely in the form of snippets of sound. This perception check cannot have advantage if the conversation is whispered. Snitches cannot overhear telepathic communications but could attempt to decipher written communication as it is being written."},
    {key:"a2",name:"A2 — Sound Signature",desc:"(2 Invested Actions) (5 Burnout Points) As 2 Invested Actions, a Snitch may search around within their radius of sound for a creature who they've studied previously. In order to study a creature to add to their Sound Signature list, a Snitch must roll a Perception check against the creatures' Deception and stay near them for at least 10 minutes in order to memorize the sounds produced by their body motions. If such a creature is within the Snitch's hearing range, the Snitch gains the ability to track their movements and position. In order to maintain this tracking, they must actively concentrate on the sound and expend 1 burnout point per minute.\nNOTE: If a creature polymorphs into another, a Snitch's sound signature will likely misfire."},
    {key:"a3",name:"A3 — I see it coming",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action when being surprised or hit by a Sneak Attack (or similar effects), a Snitch may expend 3 burnout points to nullify the surprise, thus preventing the sneak attack dice from being rolled or surprised condition from activating. Additionally, a Snitch may use this ability to remove the Stunned condition from themselves."}
  ]},
  wall_running:{name:"Wall Running",key:"wall_running",icon:"🏃",rank:"Rare",passive:"- Gymnasts gain a bonus to their walking speed equal to [5 * ISM] alongside a climbing speed equal to their walking speed. Additionally, they can use the Dash, Disengage and Dodge actions as a bonus action.\n- Gymnasts deal an additional 2 bludgeoning damage when hitting a creature with a melee attack for every 5 feet they travel before hitting that creature.",upgrades:[
    {key:"a1",name:"A1 — Speedy Dodge",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Gymnast may channel their signet in an attempt to dodge out of the way of an attack, granting disadvantage to an attack roll against the Gymnast. Alternatively, if a Gymnast are being targeted by an Invested attack that targets only them, the Invested attack is nullified.\n[3 Points] Speedy Dodge now also penalizes the triggering attack roll with a -1 penalty."},
    {key:"a2",name:"A2 — Hundred Meter Dash",desc:"(2 Invested Actions) (12 Burnout Points) As an 2 Invested Actions, a Gymnast may charge directly towards a creature (in a straight line) before slamming into them with an unarmed attack. For every 5 feet the Gymnast travels while charging up this attack, the attack's damage increases by 2 bludgeoning damage. (which stacks with the existing 2 bludgeoning damage bonus). If the attack hits, the target must make a STR save, being hurled back the same distance the Gymnast charged in the preparation of this attack. This ability's damage bonus stops at the 100 foot mark."},
    {key:"a3",name:"A3 — Horizontally Challenged",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action and provided that the triggering Gymnast is utilizing their climbing speed by running across a near vertical surface (i.e. Running across a wall, duh), a Gymnast may grant themselves a bonus to melee attack rolls during their turn equal to their [ISM * 2] and advantage on all attack rolls due to their strange position and the difficulty of avoiding their attacks. This benefit is lost at the end of their turn or when the Gymnast is no longer meeting the triggering condition.\nDM Design Note: This ability Rules as Intended is supposed to be used when a Gymnast is able to horizontally charge a creature and becomes virtually impossible to avoid. For those calling the bonus op, maybe don't fight a Wall Runner near a Wall.\n[1 Point] Horizontally Challenged grants an additional +1 bonus to melee DAMAGE when activated."}
  ]},
  blocking:{name:"Blocking",key:"blocking",icon:"🧱",rank:"Rare",passive:"- Pacifists may transfer up to half of the damage being dealt to allies within 5 feet\n- Pacifists gain doubled maximum hit points and cannot be ungrounded by damage. (I.e. Palladium still functions)\"\n- Pacifists gain a bonus to Armor Class equal to their ISM",upgrades:[
    {key:"a1",name:"A1 — Ape Strong Together",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Pacifist may use the power of their signet to prevent possible harm to allies. When casting this ability, the Pacifist gains \"Countering Points\" equal to the amount of allied creatures above 10th level within 5 feet of themselves. Each Countering Point may be used to nullify a visible signet attack within sight of the pacifist as a Free Action. The maximum amount of Countering Points a Pacifist can gain from 1 use of this ability is equal to their ISM."},
    {key:"a2",name:"A2 — BEEF UP COMRADES",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Pacifist may conjure a shield from their signet's channelled power around an allied creature within sight. This shield absorbs all damage dealt to the creature regardless of resistances or immunities and vanishes when this ability is used again. This shield has armor class equal to [{8} + PB + ISM] and hitpoints equal to [{10} * ISM]\n[1 Point] BEEF UP COMRADES's shield HP formula increases by 1\n[5 Points] BEEF UP COMRADES's AC formula increases by 1.\n[10 Points] BEEF UP COMRADES may target an additional creature when cast."}
  ]},
  astral_projection:{name:"Astral Projection",key:"astral_projection",icon:"👻",rank:"Standard",passive:"- When in Astral Form, a Projector may replace their movement with teleportation instead, and all other sources of teleportation have their distances increased by 30 feet.\n- Projectors are immune to Radiant and Psychic damage.",upgrades:[
    {key:"a1",name:"A1 — Astral Projection",desc:"(1 Invested Action) (1 Burnout Points / Turn in combat, 1 Burnout Points / Minute out of combat) A Projector may project themselves by leaving their physical body and projecting themselves to a location within sight. The Projectors physical form immediately falls unconscious and gains vulnerability to all damage. When projecting, an invisible silver cord extends from between their shoulder blade and vanishes, but points towards the direction of their true sleeping body. An Astral form perfectly duplicates the Projectors stat block but only has half of the projectors maximum hitpoints and still uses the Projector's regular limits for limited use abilities (i.e. You do not reset your sorcery or focus points).\nA projectors' Astral form does not have spell slots, though Projectors can use a Free Action to create spell slots to use in their Astral Form (the spell slots created but be of a level the Projector can cast in their physical form, and the projector maintains their list of known spells.)\nThe cost to create such a spell slot is equal to the level of the spell slot itself in burnout points\nIf a Projector's body is attacked during a Projection, the Projector is unaware of this attack, unless their physical forms are reduced to 0 hitpoints, at which point the projection immediately vanishes and the Projector returns to their body, rolling death saves.\nA projector may drop their Astral Form and return to their body (without an instant turn), waking at the start of their turn during initiative."},
    {key:"a2",name:"A2 — Astral Revitalization",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action, a Projector may cause themselves to instantly return to their physical form, immediately gaining an Instant Turn (bypassing current initiative). This Revitalization may only be used once every 2 rounds."},
    {key:"a3",name:"A3 — Astral Shift",desc:"(1 Additional Burnout Point / Turn, add-on to Astral Projection) When using Astral Projection, a Projector may activate Astral Shift to change their projection's physical features. When using Astral Shift, a Projector may only mimic the features of a humanoid creature they have interacted with or seen at least once or has been given a physical description. The accuracy of this projection is dependent on the familiarity with the creature the Projector possesses. This shift is a change in appearance only and does not grant additional statistical benefits."}
  ]},
  weakness_detection:{name:"Weakness Detection",key:"weakness_detection",icon:"🎯",rank:"Standard",passive:"- If a creature within range of a Detector is not shielding, a Detector cannot have disadvantage or any roll penalties when rolling against that creature (socially or during combat) while they have advantage on all attack rolls against the inspected creature.\n- Detectors have expertise in the Insight skill.",upgrades:[
    {key:"a1",name:"A1 — Flaw Seeker",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action, a Detector may remove an active damage resistance effect for 1 minute from a creature within sight provided their shields are inactive (Selecting 1 resistance only). This removal is suppressed if Shields are reactivated but is reapplied if shields drop again.\n[5 Points] Flaw Seeker may remove an additional resistance."},
    {key:"a2",name:"A2 — Instill Flaw",desc:"(1 Invested Action) (5 Burnout Points) As an Invested Action, a Detector may uncover a vulnerability within a creature in sight and cause them to gain a damage vulnerability of the Detectors choice for 1 minute, provided the creature does not have an active resistance or immunity to the damage type. This ability may not be used if the Detector has already used their A1 ability on the same creature during that round.\n[5 Points] Instill Flaw may instill an additional vulnerability."},
    {key:"a3",name:"A3 — Enflame Flaw",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Detector may enflame an existing vulnerability within a creature and cause any damage vulnerabilities they are currently under to become enflamed, multiplying damage of that type by 5x instead of 2x. This ability may only be applied once per turn on the same creature and cannot be applied if the Detector had used their A1 or A2 ability on the creature during that round. Additional uses of Enflame Flaw may further enflame vulnerability to 5x / 10x / 15x / 20x / 25x"}
  ]},
  silencing:{name:"Silencing",key:"silencing",icon:"🤐",rank:"Standard",passive:"- Ragebaiters always have the Silence and Counterspell spells prepared and can cast them at will\n- Ragebaiters have expertise and advantage on all checks made to be smug after using their signet",upgrades:[
    {key:"a1",name:"A1 — Pack it up bro",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Ragebaiter may attempt to forcibly shut the mouth of a creature within sight, cutting off any and all sound the creature can make. The creature must make a CON saving throw, this ability failing if the creature succeeds.\n[5 Points] Pack it up bro's save DC increases by 1"},
    {key:"a2",name:"A2 — Cat in your Tongue? (Or whatever the expression was)",desc:"(Or whatever the expression was) (2 Invested Actions) (5 Burnout Points) As 2 Invested Actions, a Ragebaiter may stop only certain words from emerging while a creature is speaking, potentially causing mass panic or getting canceled on Sovereign social media (that doesn't actually exist, yet).\nNOTE: As a Ragebaiter, you may specify using this Signet after a creature completes a sentence but not any longer than 5 seconds after they spoke.\nListening creatures can tell that a signet is at work if their passive perception is above your signet save DC.\n[5 Points] Cat in your Tongue? 's passive perception DC increases by 1"}
  ]},
  truthsayer:{name:"Truthsayer",key:"truthsayer",icon:"⚖",rank:"Standard",passive:"Truthsayers possess an uncanny ability to tell lies from truth, even when not channeling power directly through their signet. Due to this connection:\n- Truthsayers automatically gain expertise in Insight checks made to tell a lie, and can add their INV modifier to their Insight checks used for the same intent\n- Truthsayers, when analyzing a lie, can detect if the lie was made with pure intent (DM's ruling)",upgrades:[
    {key:"a1",name:"A1 — Justice",desc:"(1 Invested Action) (3 Burnout Points) A Truthsayer may attempt to Intune themselves with another creature's true spiritual self in order to tell lies from truth. In order for this ability to function, you must be able to penetrate the other creature's shields, if active. When attuned properly, a Truthsayer gains an immediate understanding of a creature's spoken words and immediately senses a pulse if the creature is lying or omitting information. This pulse also allows them to understand which part(s) of the statement the creature had made were lies."},
    {key:"a2",name:"A2 — Evidence",desc:"(1 Invested Action) (5 Burnout Points) A Truthsayer may attempt to more deeply connect their signet's energy with a creature's true self in extrapolate further information. In order to use the Evidence ability, you must already be in tune to a creature's spiritual aspect using your Justice ability. When in tune in such a way, you gain an understanding of the reason for the creature's lying, which is an underlying emotion. (Example: If a creature is lying that they weren't outside past curfew, it is likely the reason for the lie is out of fear.) It is possible the DM may allow a further ruling that this ability may dig deeper than usual."},
    {key:"a3",name:"A3 — Power",desc:"(1 Invested Action) (5 Burnout Points) A Truthsayer may attempt to connect to a creature's source of power if already in tune with the creature and having successfully used their Justice and Evidence abilities on them. When tuning themselves with Power, you gain an understanding of the creature's source of power and how it is being wielded. (Sources may be either: Sky Channeling (Signet/ Dragon), Earth Channeling (Signet / Venin), Direct Sky Channeling (Arcana / Gryphon) Under certain circumstances of concentration, you may also gain information about the nature of the creature's power channel and thereby their major abilities within that channel of power."}
  ]},
  metalurgist:{name:"Metalurgist",key:"metalurgist",icon:"⚒",rank:"Standard",passive:"- Forgelings have an uncanny method of utilizing their signets to sharpen blade edges, arrow tips and other such tool & weapons, provided they are constructed by metal. When Forgeling spends adequate time to sharpen any such ferrous items, the item gains a bonus to its attack damage equal to the Forgeling's INV modifier until the Forgeling's next long rest. This benefit does not stack.\n- Forgelings have an additional affinity with armor and its protective properties. When a Forgeling adequate time refining a ferrous equipment, the item gains a bonus to its granted armor class equal to the Forgeling's INV modifier divided by 2 (rounding up to nearest whole number) until the Forgeling's next long rest. This benefit does not stack.",upgrades:[
    {key:"a1",name:"A1 — Heat Metal",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, a Forgeling may attempt to heat any ferrous equipment within sight, causing the object to become red hot and unbearable to the touch. Any creature in physical contact with the object takes fire damage equal to the Forgeling's [INV modifier * d8s] at the start of their turn, provided they are still in contact with the object. If a creature is holding or wearing the object and takes the damage from it, the creature must succeed on a Constitution saving throw or drop the object if it can. If it doesn’t drop the object, it has Disadvantage on attack rolls and ability checks while using such a heated item.\n[10 Points] Heat Metal now causes affected creatures still in contact with the heated object to have a -1 penalty to AC. (this upgrade can only be applied thrice.)"},
    {key:"a2",name:"A2 — Shape Metal",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action when missing an attack roll while using a ferrous weapon or ferrous ammunition, a Forgeling may cause the weapon's metal to bend and shift in an attempt to hit that creature. This ability adds a bonus to the original missed attack roll equal to the Forgeling's INV modifier. If the missed attack's result is changed after this ability is used, the attack also gains bonus damage equal to the Forgeling's INV modifier.\n[3 Points] Shape Metal's missed roll bonus increases by 1.\n[2 Points] Shape Metal's new roll bonus damage increases by 1."},
    {key:"a3",name:"A3 — Destroy Metal",desc:"(3 Invested Actions) (12 Burnout Points) As an 3 Invested Actions, a Forgeling may attempt to completely melt or destroy a piece of ferrous equipment. Equipment destroyed in this way can be repaired by the damaging Forgeling at will (given some time) but is difficult for other specialists to repair. The Forgeling must roll a Invested Check with the following DCs:\nMundane item: No DC\nCommon item: {10}\nUncommon item: {15}\nRare item: {20}\nVery rare item: {25}\nLegendary item: {30}\nArtifact item {35}\n[5 Points] Destroy Metal's item DCs all decrease by 1"}
  ]},
  arborist:{name:"Arborist",key:"arborist",icon:"🌳",rank:"Standard",passive:"- Arborists have an uncanny connection to the natural world. Due to this connection, all Arborists have expertise in the Nature and Animal handling checks. Additionally, when making Nature and Animal Handling checks, Arborists may treat rolls of 9 and below as a 10\n- Arborists may cast the Spike Growth and Speak with Plants spells at will, not requiring concentration for either spell. However, both spells only last 1 minute when cast in this way. Additionally, this variant of the Spike Growth spell cannot be stacked on itself.",upgrades:[
    {key:"a1",name:"A1 — Root Strike",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, an Arborist may send spiralling roots towards a creature within {5} feet, dealing piercing OR bludgeoning damage equal to [INV MOD * d4s]. The creature then makes a DEX, CON or STR saving throw as the spiralling roots attempt to spiral around their bodies and grab them. Upon failure, the targeted creature is Grappled, and the Arborist may either reuse the Root Strike attack or use the remaining range of the initial attack to move the creature an amount of feet equal to Root Strike's attack range. Upon success, the creature is not grappled but still takes full damage.\nExample: If you successfully grapple a creature with root strike attack within 5 feet, you may move them 25 feet in any way you wish granted your range for root strike has been upgraded to 30 feet.\n[2 Points] Root Strike's range increases by 5 feet (to a maximum of 90 feet)"},
    {key:"a2",name:"A2 — Protector of Wilds",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, an Arborist may attempt to interrupt an ongoing attack roll by creating wraths of roots to wrap around the attacker, projectile or other source of harm. This ability's use is subject to DM opinion as there are specific interactions that will likely cause different results. Given that the Arborist is within range of their Root Strike attack, the roots interfere with the attack by granting the attacking creature disadvantage and a roll penalty equal to the Arborists' INV modifier.\n[5 Points] Protector of Wild's roll penalty increases by 1"},
    {key:"a3",name:"A3 — Choking Roots",desc:"(2 Invested Actions) (7 Burnout Points) As an Invested Action, an Arborist may cause roots to spiral towards an enemy creature's throat.  The creature must make a DEX saving throw. Upon failure, the creature becomes Silenced as the roots restrict its airway (this debuff does not apply if the creature does not have a visible throat or airway). Additionally, during their turns, they must make a CON save or have their turn skipped due to their preoccupation of freeing their airway. In order to remove the vines, the creature must kill the vines stat block, which is the following:\nArmor Class: {10}\nHitpoints: {25}\nUpon success of the DEX save, the attempt misses.\n[1 Point] Choking Roots' Hitpoints increases by 5 hitpoints.\n[5 Points] Choking Roots' AC increases by 1."}
  ]},
  size_change:{name:"Size Change",key:"size_change",icon:"📏",rank:"Standard",passive:"- If a Scaler is of a size smaller than a creature they are fighting, they gain advantage on all attack rolls against that creature while that creature has disadvantage on all attack rolls against the Scaler.\n- If a Scaler is of a size larger than a creature they are fighting, they gain advantage on all grapple checks against that creature and a bonus to damage equal to their ISM when hitting such a creature with an attack roll using a physical weapon or an unarmed strike.",upgrades:[
    {key:"a1",name:"A1 — Scale Object",desc:"(1 Invested Action) (Burnout Points Varies) A Scaler causes an object not equipped by a creature they touch to expand or reduce in size. The amount of Burnout Points this ability expends is up to DM's discretion depending on the attempted activity. Additionally, an object cannot be scaled past a factor of 2x.\nA Scaled Object persists for 1 minute before reverting back to its original state. If there is no space for an object to be scaled correctly, the scaling fails instead. (This rule is subject to change)\n[1 Point] Object scale cap increases by 0.1x\n[1 Point] Scale Object duration increases by 1 minute."},
    {key:"a2",name:"A2 — Scale Creature",desc:"(3 Invested Actions) (Burnout Points Varies) A Scaler causes a willing creature they touch to expend or reduce in creature size. The amount of Burnout Points this ability expends follows this table:\nTiny <-> Small - 15 Points\nSmall <-> Medium - 20 Points\nMedium <-> Large - 25 Points\nLarge <-> Huge - 50 Points\nHuge <-> Gargantuan - 125 Points\nA Scaler may also attempt to use this ability on an unwilling creature, who makes a CON saving throw to attempt to prevent the Scaling from occuring. The effects of Scale Creature persists for 1 minute, at which point the creature reverts to normal.\n[1 Point] Scale Creature's duration increases by 1 minute."}
  ]},
  farsight:{name:"Farsight",key:"farsight",icon:"🔭",rank:"Standard",passive:"- Farseers have extraordinarily keen eyesight. Their basic vision has a base range of 640 feet and can be channeled to see even further (to DM's discretion)\n- Farseers can use ranged weapons at unlimited range provided they can see the creature they are attacking",upgrades:[
    {key:"a1",name:"A1 — Heat Seeking Sight",desc:"(1 Invested Action) (3 Burnout Points) As an Invested Action, a Farseer may attempt to enhance their vision and see on the infrared spectrum of light, allowing them a measure to counteract obstacles and locate enemies. When activated, a Farseer may see creatures that are behind any type of cover (including full cover) as long as the cover is not more than 1 foot thick, is not made of aluminum or lead (or similar metals) and is not magical. If these conditions are met, the Farseer may attempt, during that time, to fire piercing shots at such creatures, provided it makes logical sense that their weapon could feasibly pierce the obstacle. This special sight wears off after 1 turn, but can be continued without expending additional Invested Actions provided you consume 3 burnout points per turn.\nExample: A Rail Gun could penetrate a foot of wall while an Arrow (even magical, unless specified) definitely cannot.\n[10 Points] Heat Seeking Sight now only expends 2 Burnout Points per round (This upgrade is 1 time only)"},
    {key:"a2",name:"A2 — Lock On Sight",desc:"(2 Invested Actions) (3 Burnout Points) As 2 Invested Actions after hitting a creature with an attack roll, a Farseer may attempt to lock their sight on that specific creature, granting them advantage on all attack rolls against that creature. While locked onto a specific creature, a Farseer expends 3 burnout points per turn while Lock on Sight is Active. Additionally, the Farseer gains a {+1} bonus to all attack rolls to hit the creature they are locked on, and their shots gain the ability to curve around obstacles to hit a creature, provided it does not change directions more than once.\n[3 Points] Lock On Sight's attack roll bonus increases by 1\n[10 Points] Lock On Sight's per turn Burnout cost is reduced to 2. (This upgrade is 1 time only)"}
  ]},
  illusion:{name:"Illusionist",key:"illusion",icon:"🎭",rank:"Standard",passive:"- Illusionists have truesight with a range of 120 feet. However, this special version of truesight cannot see invisibility\n- Illusionists gain the ability to cast spells from the school of Illusion that are 3rd level or lower at will. (Exception: Illusionists cannot cast the spell Invisibility with this feature) If an Illusionist are not a spellcaster, their spellcasting modifier is their class's primary ability score (save DC and spell hit calculated as standardized in the 5e SRD).\n- An Illusionists illusion may mimic a physical aspect, and therefore cannot be detected by creatures with blindsight (truesight still functions)",upgrades:[
