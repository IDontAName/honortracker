    {key:"a1",name:"A1 — Supreme Image",desc:"(1 Invested Action) (5 Burnout Points) An illusionist may cast the Major Image spell using this ability, but with the following added benefits:\n- You no longer require a Magic Action to move the illusion but must only move it during your turn (and within reason)\n- The image is no longer limited by a 20 foot cube but instead a {50} foot cube\n- The spell does not require concentration\n- The spell lasts until dispelled\n[1 Point] Supreme Image's maximum illusion size increases by 5 feet in a cube"},
    {key:"a2",name:"A2 — Uncanny Realism",desc:"(3 Invested Actions) (15 Burnout Points) An illusionist may use this ability to enhance an illusion to have it gain a physical aspect. When an illusion is enhanced in this way, it becomes an actual physical object unless a creature has truesight or succeeds a study action against the illusionist's save DC. If an illusionist were to enhance an illusion of a creature in this way, the creature may be able to make physical attacks but cannot mimic anything non-physical (such as spellcasting, or certain traits). For example, if an illusionist were to enhance the image of a powerful wizard, they could strike creatures with their quarterstaff but could not cast spells. The CR of creatures an illusionist may create physical aspects of is equal to their level divided by 2.\n[10 Points] The CR of creatures an illusionist may create physical aspects of is increased by 0.5"},
    {key:"a3",name:"A3 — Armor of Lies",desc:"(1 Invested Action / Turn) (2 Burnout Points / Turn) An illusionist may summon their magic to create illusions of themselves around their real position, hiding among the illusions. (Truesight allows an enemy to bypass this feature). While shielded by these illusions, the illusionist gains the following benefits:\n- All attack rolls against the illusionist roll a d4 before being rolled, hitting an illusion and automatically missing if the roll is not a 4\n- The illusionist gains +2 AC\n- The illusionist may not be targeted by any spells that target only 1 creature, unless the caster rolls a d4 and gets a 4.\n- If an AoE spell or attack hits the illusionists position, Armor of Lies is suppressed until the beginning of the illusionists next turn."}
  ]},
  toxicology:{name:"Toxicology",key:"toxicology",icon:"☠",rank:"Standard",passive:"- Toxicologists have immunity to Poison damage. When subjected to the Poisoned condition, Toxicologists instead gain the benefit of a Haste spell for the duration of the Poisoned condition (without requiring concentration)\n- When rolling checks to fabricate Poisons, Toxicologists may treat rolls of 9 or lower as 10.\n- Once per turn, Toxicologists may coat a weapon or ammunition with Poison without action economy cost.",upgrades:[
    {key:"a1",name:"A1 — Unholy Channel",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, Toxicologists may channel their signet and entrench its energy into a bottle of basic poison. Choosing one of the following options:\nContact\nThe poison becomes a potent contact poison which, when touched by uncovered flesh, causes catastrophic corrosion similar to the effects of Acid. The creature who comes in contact with this poison makes a CON saving throw, taking poison damage equal to [0.6 * Points used] in d8s and likely losing skin upon failure or half damage on success.\n- This poison can be noticed with a successful Survival check against your Signet DC\nIngested\nThe poison becomes a potent Ingested Poison which, when Ingested, causes a burning sensation in the ingesting creatures' airway. The creature immediately begins suffocating and makes a CON saving throw, taking poison damage equal to [1.2 * Points used] in d8s and falling unconscious upon failure (retrying the CON save at the start of their turns) or half damage on success.\n- This poison can be detected with a successful Perception check against your Signet DC\nInhaled\nThe poison becomes a potent Inhaled Poison which, when delivered in an aerosol fashion in some way, creates a cloud up to 15 by 15 feet. Creatures starting their turn within the cloud take poison damage equal the [amount of Points you chose to consume].\nInjury\nThe poison becomes a potent Injury Poison which, when delivered by coating a weapon or 10 pieces of ammunition, adds a bonus amount of Poison damage to your attacks equal to [0.3 * Points used)]. When coated on a weapon, this poison stays on the weapon for 1 minute."},
    {key:"a2",name:"A2 — Serpent's Gaze",desc:"(1 Invested Action) (1 Burnout Point) As an Invested Action, Toxicologists may inspect any object or surface for traces of Toxins. If a toxin is present in the food / weapon / surface (etc) being inspected, the Toxicologist immediately gains knowledge of the Toxins nature and how long it has been in that location."},
    {key:"a3",name:"A3 — Own Worst Enemy",desc:"(1 Invested Action) (Burnout Points Vary) As an Invested Action, Toxicologists may end the poisoned condition on any creature of their choice within sight. If the poison was NOT a mixture or signet based poison, the poison's effect is immediately nullified provided that its damage per turn value is less than 50 poison damage and the Toxicologist expends burnout points equal to the poison's per turn damage divided by 10. If the poison is a mixture or signet based poison, the amount of burnout points required to nullify the poison is equal to the level of spell slot used in the poisons' creation or the amount of burnout points used to create the poison. If the per turn damage of a non-signet and non-mixture poison is above 50, its effect cannot be nullified by this ability."}
  ]},
  water_breathing:{name:"Water Breathing",key:"water_breathing",icon:"🫧",rank:"Standard",passive:"- Water Breathers can (duh) breathe underwater and are immune to all effects of suffocation (This includes effects from the Water signet)\n- Water Breathers do not have disadvantage against all attacks when underwater, instead gaining advantage on all attack rolls instead. Additionally, Water Breathers do not treat water as difficult terrain.",upgrades:[

async function api(action,body={}){
  const h={"Content-Type":"application/json","apikey":PUB,"Authorization":"Bearer "+PUB};
  if(TOKEN)h["x-session-token"]=TOKEN;
  const res=await fetch(API,{method:"POST",headers:h,body:JSON.stringify({action,...body})});
  let d={};try{d=await res.json();}catch(e){}
  if(!res.ok)throw new Error(d.error||("HTTP "+res.status));
  return d;
}
function toast(msg,dur=2400){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),dur);
}

function fmtDate(iso){if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"2-digit"})+" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});}
// Safe encoding for string values placed inside onclick="fn(HERE)" attributes.
// JSON.stringify gives a valid JS literal; replace " with &quot; so it doesn't

function jsonAttr(val){return JSON.stringify(val==null?"":String(val)).replace(/"/g,'&quot;');}
async function loadCharacters(){
  const sel=document.getElementById("lChar");
  try{const{characters}=await api("list_characters");
    sel.innerHTML='<option value="">Select your name…</option>'+characters.map(c=>`<option value="${esc(c.character_name)}">${esc(c.character_name)}${c.is_dm?" (Dungeon Master)":""}</option>`).join("");
  }catch(e){sel.innerHTML='<option value="">Could not load — retry</option>';}
}
async function doLogin(){
  const character_name=document.getElementById("lChar").value;
  const password=document.getElementById("lPw").value;
  const err=document.getElementById("loginErr");
  err.textContent="";
  if(!character_name){err.textContent="Choose your character.";return;}
  if(!password){err.textContent="Enter your passphrase.";return;}
  try{
    const r=await api("login",{character_name,password});
    TOKEN=r.token;localStorage.setItem(TKEY,TOKEN);
    ME={name:r.character_name,is_dm:r.is_dm,honor_score:r.honor_score??0};
    await enterHub();
  }catch(e){err.textContent=e.message;}
}
async function tryResume(){
  if(!TOKEN)return false;
  try{const r=await api("me");ME={name:r.character_name,is_dm:r.is_dm,honor_score:r.honor_score??0};await enterHub();return true;}
  catch(e){TOKEN=null;localStorage.removeItem(TKEY);return false;}
}
async function doLogout(){
  stopPolling();
  try{await api("logout");}catch(e){}
  TOKEN=null;localStorage.removeItem(TKEY);location.reload();
}
async function enterHub(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("hub").style.display="block";
  updateWhoami();
  if(ME.is_dm){
    try{players=(await api("list_players")).players.filter(p=>!p.is_dm);}catch(e){}
    document.getElementById("dmTabBtn").style.display="flex";
    addDMRosterButtons();
  }
  await refreshState();
  loadInboxBadge();
}
function updateWhoami(previewName){
  const el=document.getElementById("whoami");
  if(previewName){
    el.innerHTML=`<span style="color:var(--blood-bright)">Previewing as</span> <b>${esc(previewName)}</b> <button class="mini-btn" onclick="exitPreview()" style="margin-left:6px">Exit</button>`;
  }else if(ME.is_dm){
    el.innerHTML=`Logged in as <b>${esc(ME.name)}</b><span class="badge-dm">DM</span>`;
  }else{
    const h=ME.honor_score??0;
    el.innerHTML=`Logged in as <b>${esc(ME.name)}</b><span class="honor-chip" onclick="showHonorExplain()" title="How honor works">⚔ ${h}</span>`;
  }
}
function openChangePw(){

    <div class="mff full"><label>New Passphrase</label><input id="np1" type="password" placeholder="New passphrase…"/></div>
    <div class="mff full"><label>Confirm</label><input id="np2" type="password" placeholder="Repeat…"/></div>
    <div class="modal-actions"><button class="mini-btn" onclick="document.getElementById('modalBg').classList.remove('open')">Cancel</button>
    <button class="mini-btn go" onclick="submitChangePw()">Save</button></div>`;

async function submitChangePw(){
  const p1=document.getElementById("np1").value,p2=document.getElementById("np2").value;
  if(p1!==p2){toast("Passphrases don't match");return;}
  if(p1.length<3){toast("Too short");return;}
  try{await api("change_password",{new_password:p1});toast("Passphrase updated");document.getElementById("modalBg").classList.remove("open");}
  catch(e){toast("Error: "+e.message);}
}
window.addEventListener("load",async()=>{
  loadCharacters();
  document.getElementById("loginBtn").onclick=doLogin;
  document.getElementById("lPw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  document.getElementById("logoutBtn").onclick=doLogout;
  document.getElementById("pwBtn").onclick=openChangePw;
  document.getElementById("themeBtn").onclick=openThemeModal;
  initTheme();
  document.getElementById("sideClose").onclick=closeSide;
  document.getElementById("statsClose").onclick=closeStats;

    if(!btn||!btn.dataset.tab)return;

  });

    switchDmSub(btn.dataset.dm);
  });
  document.getElementById("q").addEventListener("input",e=>{F.q=e.target.value;render();});
  document.getElementById("fGroup").addEventListener("change",e=>{F.group=e.target.value;render();});
  document.getElementById("fStatus").addEventListener("change",e=>{F.status=e.target.value;render();});
  document.getElementById("fSort").addEventListener("change",e=>{F.sort=e.target.value;render();});
  document.getElementById("cHidedead").addEventListener("click",e=>{F.hideDead=!F.hideDead;e.currentTarget.classList.toggle("on",F.hideDead);render();});
  document.getElementById("cPortraits").addEventListener("click",e=>{portraitsMode=!portraitsMode;e.currentTarget.classList.toggle("on",portraitsMode);render();});
  document.getElementById("cGroups").addEventListener("click",e=>{portraitGrouped=!portraitGrouped;e.currentTarget.classList.toggle("on",portraitGrouped);if(portraitsMode)render();});
  document.getElementById("modalBg").addEventListener("click",e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove("open");});
  const impParam=new URLSearchParams(location.search).get("imp_token");
  if(impParam){
    TOKEN=impParam;localStorage.setItem(TKEY,TOKEN);
    history.replaceState(null,"",location.pathname);
  }
  if(TOKEN)await tryResume();
});
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll(".hub-tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.querySelectorAll(".tab-section").forEach(s=>s.classList.toggle("active",s.id==="tab-"+tab));
  if(tab==="invest")loadInvestiture();
  if(tab==="inbox")loadInbox();
  if(tab==="dmpanel")loadDmSub(activeDmSub);
}
function switchDmSub(sub){
  activeDmSub=sub;
  document.querySelectorAll(".dm-nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.dm===sub));
  loadDmSub(sub);
}

async function refreshState(){

  STATE.honor_score=r.honor_score??0;STATE.rep_groups=r.rep_groups||[];
  if(!ME.is_dm)ME.honor_score=STATE.honor_score;
  buildGroupFilter();render();startPolling();
}
async function refreshSilently(){
  try{const r=await api("get_state");STATE.scores=r.scores||{};render();}catch(e){}
}
async function pollScores(){
  if(!TOKEN)return;
  try{const r=await api("poll_scores");
    const changed=Object.entries(r.scores||{}).some(([id,v])=>STATE.scores[id]!==v)||Object.keys(STATE.scores).some(id=>r.scores[id]===undefined);
    if(changed){STATE.scores=r.scores||{};render();if(selectedId)openSide(selectedId);}
  }catch(e){}
}
function startPolling(){stopPolling();_pollTimer=setInterval(pollScores,8000);}
function stopPolling(){if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}}
function buildGroupFilter(){
  const groups=[...new Set(STATE.npcs.map(n=>n.grp).filter(Boolean))];
  const sel=document.getElementById("fGroup");
  sel.innerHTML='<option value="">All</option>'+groups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join("");
}
function repOf(id){return STATE.scores[id]??0;}
function honorBonus(){return Math.round((STATE.honor_score??0)/10);}
function applyHonorBonus(base,bonus){
  if(bonus===0||base<0)return base;
  const raw=base+bonus;
  if(raw<=10)return raw;
  if(base>=10)return base+Math.round(bonus/2);
  const under=10-base,over=bonus-under;
  return 10+Math.round(over/2);
}
function effectiveScore(id){
  const n=STATE.npcs.find(x=>x.id===id);
  if(n&&n.deceased)return repOf(id);
  const base=repOf(id);
  if(base>10)return base;
  return applyHonorBonus(base,honorBonus());
}
function filtered(){
  let list=STATE.npcs.slice();
  if(F.group)list=list.filter(n=>n.grp===F.group);
  if(F.status==="Deceased")list=list.filter(n=>n.deceased);
  else if(F.status==="Active")list=list.filter(n=>!n.deceased);
  if(F.hideDead)list=list.filter(n=>!n.deceased);
  if(F.q){const q=F.q.toLowerCase();list=list.filter(n=>[n.name,n.role,n.grp,n.subgroup,n.signet,n.second_signet,n.status].some(v=>v&&String(v).toLowerCase().includes(q)));}
  if(F.sort==="name")list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(F.sort==="role")list.sort((a,b)=>(a.role||"").localeCompare(b.role||""));
  else if(F.sort==="rep_hi")list.sort((a,b)=>repOf(b.id)-repOf(a.id));
  else if(F.sort==="rep_lo")list.sort((a,b)=>repOf(a.id)-repOf(b.id));
  else list.sort((a,b)=>(a.sort_order??1e9)-(b.sort_order??1e9));
  return list;
}
function repColor(v){return v>0?"var(--pos-bright)":v<0?"var(--blood-bright)":"var(--neutral)";}
function repWord(v){if(v>=15)return"Devoted";if(v>=8)return"Trusted";if(v>=3)return"Friendly";if(v>-3)return"Neutral";if(v>-8)return"Wary";if(v>-15)return"Hostile";return"Nemesis";}
function repBar(v){
  const pct=Math.abs(v)/20*50,cls=v>=0?"p":"n",left=v>=0?50:50-pct,dotPos=(v+20)/40*100;
  return `<div class="rep-shell"><div class="rep-track"><div class="rep-mid"></div><div class="rep-fill ${cls}" style="left:${left}%;width:${pct}%"></div></div><div class="rep-dot" style="left:${dotPos}%"></div></div>`;
}
function ordinal(n){n=parseInt(n);if(isNaN(n))return null;const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function formationLabel(n){
  const bits=[];
  if(n.squad){const sq=/^\d/.test(n.squad)?n.squad:(ordinal(n.squad)||n.squad);bits.push(sq+" Squad");}
  const isLead=n.section&&/leadership/i.test(n.section);
  if(isLead)bits.push("Leadership");else if(n.section)bits.push(n.section+" Section");
  if(n.wing){const w=ordinal(n.wing)||("Wing "+n.wing);bits.push(w+" Wing");}
  return bits.join(" ");
}
function posText(n){return formationLabel(n);}
function formationSectionHeader(n){return formationLabel(n)||"—";}
function subgroupKeyFor(n){if(n.wing||(n.section&&/leadership/i.test(n.section)))return formationSectionHeader(n);return n.subgroup||"—";}
function peersOf(n){
  const g=n.grp||"Unaffiliated",sg=subgroupKeyFor(n);
  return STATE.npcs.filter(x=>(x.grp||"Unaffiliated")===g&&subgroupKeyFor(x)===sg).sort((a,b)=>(a.sort_order??1e9)-(b.sort_order??1e9));
}
function cardHTML(n){
  const base=repOf(n.id),v=effectiveScore(n.id),hasBonus=v!==base&&!ME.is_dm&&!previewMode?.isDM,pos=posText(n);
  if(reorderMode){
    return `<div class="card reorder ${n.deceased?'dead':''}" data-id="${n.id}">
      <div class="reorder-handles"><button class="ro-btn" data-dir="up">▲</button><button class="ro-btn" data-dir="down">▼</button></div>
      <div class="ro-info"><div class="nm">${esc(n.name)}</div>${n.role?`<div class="role">${esc(n.role)}</div>`:''}</div></div>`;
  }
  return `<div class="card ${n.deceased?'dead':''} ${n.id===selectedId?'sel':''}" data-id="${n.id}">
    ${n.easter_egg_url&&n.easter_egg_enabled?`<a class="egg-sigil" href="${esc(n.easter_egg_url)}" target="_blank" rel="noopener" title="${esc(n.easter_egg_label||"✦")}" onclick="event.stopPropagation()">✦</a>`:''}
    <div class="nm">${esc(n.name)}</div>${n.role?`<div class="role">${esc(n.role)}</div>`:''}
    ${pos?`<div class="pos">${esc(pos)}</div>`:''}${n.status?`<span class="status">${esc(n.status)}</span>`:''}
    <div class="rep"><div class="rep-top"><span class="rep-lbl">NPC Regard</span>
      <span class="rep-val" style="color:${repColor(v)}">${v>0?'+':''}${v} · ${repWord(v)}${hasBonus?` <span class="honor-tag" title="+${v-base} Honor">⚔</span>`:""}</span></div>
    ${repBar(v)}<div class="rep-words"><span>−20</span><span>0</span><span>+20</span></div></div></div>`;
}
function portraitCardHTML(n){
  const v=effectiveScore(n.id),pct=Math.abs(v)/20*50,left=v>=0?50:50-pct,fill=v>0?"var(--pos-bright)":v<0?"var(--blood-bright)":"transparent";
  const url=STORAGE_PUBLIC+esc(n.portrait_path);
  return `<div class="portrait-card ${n.deceased?'dead':''} ${n.id===selectedId?'sel':''}" data-id="${n.id}">
    <img src="${url}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
    <div class="pc-ph" style="display:none">${esc((n.name||"?").charAt(0))}</div>
    <div class="pc-info"><div class="pc-name">${esc(n.name)}</div><div class="pc-rep">${v>0?"+":""}${v} · ${repWord(v)}</div></div></div>`;
}
function render(){
  const list=filtered();
  document.getElementById("count").textContent=`${list.length} of ${STATE.npcs.length} records`;
  const main=document.getElementById("htMain");
  if(!list.length){main.innerHTML=`<div class="empty">No records match your search.</div>`;return;}
  if(portraitsMode){
    const wp=list.filter(n=>n.portrait_path),wo=list.filter(n=>!n.portrait_path);
    if(!wp.length){main.innerHTML=`<div class="empty">No NPCs with portraits in current filter.</div>`;return;}
    document.getElementById("count").textContent=`${wp.length} portraits (${wo.length} without)`;
    if(!portraitGrouped){main.innerHTML=`<div class="portrait-grid">${wp.map(portraitCardHTML).join("")}</div>`;}
    else{
      const groups=[],gmap={};
      for(const n of wp){const g=n.grp||"Unaffiliated";if(!gmap[g]){gmap[g]={name:g,npcs:[]};groups.push(gmap[g]);}gmap[g].npcs.push(n);}
      main.innerHTML=groups.map(g=>`<section class="grp"><div class="grp-head"><h2>${esc(g.name)}</h2><div class="rule"></div><span class="gcount">${g.npcs.length}</span></div><div class="portrait-grid">${g.npcs.map(portraitCardHTML).join("")}</div></section>`).join("");
    }
    main.querySelectorAll(".portrait-card").forEach(c=>c.addEventListener("click",()=>openSide(c.dataset.id)));return;
  }
  if(F.sort!=="default"&&!reorderMode){
    const label={name:"Name (A–Z)",role:"Role",rep_hi:"Reputation (high→low)",rep_lo:"Reputation (low→high)"}[F.sort]||"Sorted";
    main.innerHTML=`<section class="grp"><div class="grp-head"><h2>${esc(label)}</h2><div class="rule"></div><span class="gcount">${list.length}</span></div><div class="subgrp"><div class="cards">${list.map(cardHTML).join("")}</div></div></section>`;
    wireCards(main);return;
  }
  const groups=[],gmap={};
  for(const n of list){
    const g=n.grp||"Unaffiliated";
    if(!gmap[g]){gmap[g]={name:g,subs:{},order:[]};groups.push(gmap[g]);}
    const sg=subgroupKeyFor(n);
    if(!gmap[g].subs[sg]){gmap[g].subs[sg]=[];gmap[g].order.push(sg);}
    gmap[g].subs[sg].push(n);
  }
  let html="";
  for(const g of groups){
    const total=g.order.reduce((s,k)=>s+g.subs[k].length,0);
    html+=`<section class="grp"><div class="grp-head"><h2>${esc(g.name)}</h2><div class="rule"></div><span class="gcount">${total}</span></div>`;
    for(const sg of g.order){
      const showSub=sg!=="—";
      html+=`<div class="subgrp">${showSub?`<div class="subgrp-head">${esc(sg)}</div>`:''}<div class="cards">`;
      html+=g.subs[sg].map(cardHTML).join("");
      html+=`</div></div>`;
    }
    html+=`</section>`;
  }
  main.innerHTML=html;wireCards(main);
}
function wireCards(main){
  if(reorderMode){
    main.querySelectorAll(".ro-btn").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();moveCard(btn.closest(".card").dataset.id,btn.dataset.dir);}));
  }else{
    main.querySelectorAll(".card").forEach(c=>c.addEventListener("click",()=>openSide(c.dataset.id)));
  }
}
async function moveCard(id,dir){
  const n=STATE.npcs.find(x=>x.id===id);if(!n)return;
  const peers=peersOf(n),i=peers.findIndex(x=>x.id===id),j=dir==="up"?i-1:i+1;
  if(j<0||j>=peers.length)return;
  [peers[i],peers[j]]=[peers[j],peers[i]];
  const base=Math.min(...peers.map(p=>p.sort_order??0).filter(x=>Number.isFinite(x)));
  const start=Number.isFinite(base)?base:0;
  const items=peers.map((p,idx)=>({id:p.id,sort_order:start+idx}));
  items.forEach(it=>{const p=STATE.npcs.find(x=>x.id===it.id);if(p)p.sort_order=it.sort_order;});
  render();
  try{await api("reorder_npcs",{items});}catch(e){toast("Reorder save failed: "+e.message);}
}

async function loadDMPlayers(n){

    box.innerHTML=pl.map(p=>{

      const effective=(baseVal>=0&&baseVal<=10&&hb>0)?applyHonorBonus(baseVal,hb):baseVal;
      const showBonus=effective!==baseVal,vc=repColor(baseVal);
      return `<div class="pl-grid" data-aid="${p.id}" data-honor="${honor}" data-npcid="${n.id}">
        <div class="pl-name">${esc(p.character_name)}</div>
        <div class="pl-ctrl" style="grid-row:1${showBonus?'/3':''}">
          <button class="pl-step" data-delta="-1">−</button>
          <div class="pl-val" style="color:${vc}">${baseVal>0?'+':''}${baseVal}</div>
          <button class="pl-step" data-delta="1">+</button>

    }).join("");
    box.querySelectorAll(".pl-grid").forEach(grid=>{
      const aid=grid.dataset.aid,npcId=grid.dataset.npcid,honor=parseInt(grid.dataset.honor||"0"),hb=Math.round(honor/10);
      const valEl=grid.querySelector(".pl-val");let cur=parseInt(valEl.textContent)||0,t=null;
      const upd=(v)=>{valEl.textContent=(v>0?'+':'')+v;valEl.style.color=repColor(v);let sub=grid.querySelector(".pl-honor-sub");
        if(v>=0&&v<=10&&hb>0){const eff=applyHonorBonus(v,hb);if(!sub){sub=document.createElement("div");sub.className="pl-honor-sub";grid.appendChild(sub);}sub.textContent=`⚔ +${hb} honor → effectively ${eff>0?'+':''}${eff}`;}else if(sub)sub.remove();};
      grid.querySelectorAll(".pl-step").forEach(btn=>btn.addEventListener("click",()=>{
        cur=Math.max(-20,Math.min(20,cur+parseInt(btn.dataset.delta)));upd(cur);
        clearTimeout(t);t=setTimeout(async()=>{try{await api("set_score",{target_account_id:aid,npc_id:npcId,value:cur});}catch(e){toast("save failed");}},300);
      }));
      valEl.addEventListener("click",()=>{
        const inp=document.createElement("input");inp.type="number";inp.min=-20;inp.max=20;inp.value=cur;
        inp.style.cssText="width:36px;height:27px;text-align:center;background:var(--ink2);border:1px solid var(--gold-dim);border-radius:2px;color:var(--parch);font-family:'Cinzel',serif;font-size:.84rem";

        inp.addEventListener("blur",commit);inp.addEventListener("keydown",e=>{if(e.key==="Enter")commit();});
      });
    });
  }catch(e){const box=document.getElementById("dmPlayers");if(box)box.innerHTML=`<div style="color:var(--blood-bright);font-size:.83rem">${esc(e.message)}</div>`;}

function updateBurnoutUI(val){
  const caps=getBurnoutCaps();
  document.getElementById("burnoutVal").textContent=val;
  const pct=Math.min(val/caps.complete*100,100);
  const fill=document.getElementById("burnoutFill");
  fill.style.width=pct+"%";
  fill.style.background=val>=caps.complete?"#fff":val>=caps.high?"var(--blood-bright)":val>=caps.risk?"var(--gold)":"var(--pos)";
  const status=document.getElementById("burnoutStatus");
  if(val>=caps.complete){status.innerHTML='<span class="burnout-status-complete"> COMPLETE</span>';}
  else if(val>=caps.high){status.innerHTML='<span class="burnout-status-high"> HIGH RISK</span>';}
  else if(val>=caps.risk){status.innerHTML='<span class="burnout-status-risk"> AT RISK</span>';}
  else{status.innerHTML="";}
  const bar=document.getElementById("burnoutBar");
  bar.querySelectorAll(".burnout-mark,.burnout-mark-label").forEach(e=>e.remove());
  const rPct=(caps.risk/caps.complete*100).toFixed(1);
  const hPct=(caps.high/caps.complete*100).toFixed(1);
  bar.insertAdjacentHTML("beforeend",`<div class="burnout-mark risk" style="left:${rPct}%"></div><div class="burnout-mark-label risk" style="left:${rPct}%">${caps.risk}</div><div class="burnout-mark high" style="left:${hPct}%"></div><div class="burnout-mark-label high" style="left:${hPct}%">${caps.high}</div><div class="burnout-mark complete" style="left:100%"></div><div class="burnout-mark-label complete" style="left:100%">${caps.complete}</div>`);
}

async function investBurnoutUpgrade(){
  const tp=ISTATE.training_points||0;const ap=ISTATE.available_points||0;
  const maxAfford=tp+ap;
  if(maxAfford<1){toast("Not enough points");return;}
  const input=prompt(`Raise all burnout caps by how much?\nYou can afford up to ${maxAfford} (${tp} TP + ${ap} IP).\nTraining points are used first.`,"1");
  if(input===null)return;
  const amt=Math.max(1,parseInt(input)||1);
  if(amt>maxAfford){toast("Not enough points (max "+maxAfford+")");return;}
  const tpUsed=Math.min(amt,tp);const ipUsed=amt-tpUsed;
  const costDesc=tpUsed&&ipUsed?`${tpUsed} TP + ${ipUsed} IP`:tpUsed?`${tpUsed} TP`:`${ipUsed} IP`;
  if(!confirm(`Raise all burnout caps by ${amt}?\nCost: ${costDesc}`))return;
  try{const r=await api("invest_burnout_upgrade",{amount:amt});ISTATE.burnout_upgrades=r.burnout_upgrades;await loadInvestiture();toast("Burnout caps raised by "+amt+"!");}catch(e){toast("Error: "+e.message);}
}

  const nv=Math.max(0,Math.min(cur+delta,maxCharges));

    const valEl=document.getElementById("charges_"+skillId);if(valEl)valEl.textContent=nv;toast("Charges: "+nv);}catch(e){toast("Error: "+e.message);}
}
async function setChargesManual(skillId,maxCharges){
  const skill=(ISTATE.skills||[]).find(s=>s.id===skillId);if(!skill)return;
  const val=prompt("Set charges to:",skill.current_charges!=null?skill.current_charges:maxCharges);
  if(val===null)return;
  const nv=Math.max(0,Math.min(parseInt(val)||0,maxCharges));
  try{await api("update_charges",{skill_id:skillId,value:nv});skill.current_charges=nv;
    const valEl=document.getElementById("charges_"+skillId);if(valEl)valEl.textContent=nv;toast("Charges set to "+nv);}catch(e){toast("Error: "+e.message);}

        ${p.has_signets?"":'<div style="font-size:.7rem;color:var(--txt-faint);font-style:italic">No signets</div>'}
        ${chargesHTML?`<div style="margin-top:4px"><div style="font-size:.6rem;color:var(--gold-dim);font-family:Cinzel,serif;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Metal Charges</div>${chargesHTML}</div>`:''}

function openPortrait(n){
  const mb=document.getElementById("modalBg"),m=document.getElementById("modal");
  m.innerHTML=`<h3>Portrait — ${esc(n.name)}</h3><div class="msub">Upload an image. Drag sliders to adjust.</div>
    <div class="uploader">
      <input type="file" id="pfile" accept="image/*"/>
      <div id="pcropwrap" style="display:none">
        <canvas id="pcanvas" width="300" height="300"></canvas>
        <div class="crop-row">
          <label>Zoom</label><input type="range" id="pzoom" min="1" max="4" step="0.01" value="1" style="width:140px"/>
          <label>X</label><input type="range" id="px" min="-200" max="200" value="0" style="width:100px"/>
          <label>Y</label><input type="range" id="py" min="-200" max="200" value="0" style="width:100px"/>
        </div>
      </div>
    </div>
    <div class="modal-actions"><button class="mini-btn" onclick="document.getElementById('modalBg').classList.remove('open')">Cancel</button><button class="mini-btn go" id="p_save" disabled>Upload &amp; Save</button></div>`;
  mb.classList.add("open");
  const cv=document.getElementById("pcanvas"),ctx=cv.getContext("2d");
  let img=null,zoom=1,ox=0,oy=0;
  function draw(){ctx.fillStyle="#14121b";ctx.fillRect(0,0,300,300);if(!img)return;const base=Math.max(300/img.width,300/img.height),s=base*zoom,w=img.width*s,h=img.height*s;ctx.drawImage(img,(300-w)/2+ox,(300-h)/2+oy,w,h);}
  document.getElementById("pfile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{img=new Image();img.onload=()=>{document.getElementById("pcropwrap").style.display="block";document.getElementById("p_save").disabled=false;zoom=1;ox=0;oy=0;draw();};img.src=r.result;};r.readAsDataURL(f);};
  document.getElementById("pzoom").oninput=e=>{zoom=+e.target.value;draw();};
  document.getElementById("px").oninput=e=>{ox=+e.target.value;draw();};
  document.getElementById("py").oninput=e=>{oy=+e.target.value;draw();};
  document.getElementById("p_save").onclick=async()=>{
    if(!img)return;
    const out=document.createElement("canvas");out.width=512;out.height=512;const octx=out.getContext("2d");
    const base=Math.max(300/img.width,300/img.height),s=base*zoom,w=img.width*s,h=img.height*s,sc=512/300;
    octx.fillStyle="#14121b";octx.fillRect(0,0,512,512);octx.drawImage(img,((300-w)/2+ox)*sc,((300-h)/2+oy)*sc,w*sc,h*sc);
    const dataURL=out.toDataURL("image/jpeg",.85),b64=dataURL.split(",")[1],fname=`npc_${n.id}_${Date.now()}.jpg`;
    document.getElementById("p_save").disabled=true;document.getElementById("p_save").textContent="Uploading…";
    try{const r=await api("upload_portrait",{npc_id:n.id,filename:fname,data_base64:b64,content_type:"image/jpeg"});
      const loc=STATE.npcs.find(x=>x.id===n.id);if(loc)loc.portrait_path=r.portrait_path;
      toast("Portrait saved");mb.classList.remove("open");openSide(n.id);render();
    }catch(e){toast("Upload failed: "+e.message);document.getElementById("p_save").disabled=false;document.getElementById("p_save").textContent="Upload & Save";}
  };
}

let STATS=null,_charts=[],_statsPlayerFilter="",_statsIncludeHonor=true;
const CH={gold:"#c9a24b",goldDim:"#8a7232",pos:"#6fcf91",posD:"#4f9d6b",neg:"#c8413f",negD:"#9e2b2b",parch:"#e8dcc0",dim:"#9d9482",faint:"#6f6a5e",grid:"rgba(120,110,90,.14)",ink:"#14121b"};

  // distribution chart

  if(cDist){

  const cGrp=document.getElementById("cGrp");
  if(cGrp){
    const chart=new Chart(cGrp,{type:"bar",data:{labels:grpLabels,datasets:[{data:grpAvgs,backgroundColor:grpAvgs.map(v=>v>=0?CH.posD:CH.negD),borderRadius:3}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:CH.dim},grid:{color:CH.grid}},y:{ticks:{color:CH.dim}}}}});
    _charts.push(chart);
  }
  // player comparison
  const cPlayers=document.getElementById("cPlayers");
  if(cPlayers&&pl.length>1){
    const pAvgs=pl.map(p=>{const ss=STATS.scores.filter(s=>s.account_id===p.id);return ss.length?Math.round(ss.reduce((a,x)=>a+x.value,0)/ss.length*10)/10:0;});
    const chart=new Chart(cPlayers,{type:"bar",data:{labels:pl.map(p=>p.character_name),datasets:[{label:"Avg Score",data:pAvgs,backgroundColor:PALETTE,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:CH.dim}},y:{ticks:{color:CH.dim},grid:{color:CH.grid}}}}});
    _charts.push(chart);
  }

];
const THEME_KEY="dnd_hub_theme",ACCENT_KEY="dnd_hub_accent";
let _currentTheme="dark",_customAccent=null;

function initTheme(){
  _currentTheme=localStorage.getItem(THEME_KEY)||"dark";
  _customAccent=localStorage.getItem(ACCENT_KEY)||null;
  applyTheme(_currentTheme,_customAccent);
}
function applyTheme(id,accentHex){
  document.documentElement.className=id==="dark"?"":"theme-"+id;
  if(accentHex){
    const dimmed=hexDim(accentHex,.65);
    document.documentElement.style.setProperty("--gold",accentHex);
    document.documentElement.style.setProperty("--gold-dim",dimmed);
  } else {
    document.documentElement.style.removeProperty("--gold");
    document.documentElement.style.removeProperty("--gold-dim");
  }
}
function hexDim(hex,factor){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return "#"+[r,g,b].map(c=>Math.round(c*factor).toString(16).padStart(2,"0")).join("");
}

      <div class="sw-name">${t.name}</div>
    </div>`).join("");
  const accentVal=_customAccent||"";
  m.innerHTML=`<h3>Theme &amp; Appearance</h3>
    <div class="msub">Choose a preset theme or set a custom accent colour.</div>
    <div class="theme-grid">${swatches}</div>
    <div class="theme-custom-row">
      <label>Custom Accent</label>
      <input type="color" id="accentPicker" value="${accentVal||"#c9a24b"}" oninput="previewAccent(this.value)"/>
      <button class="mini-btn go" onclick="applyCustomAccent()">Apply</button>
      ${_customAccent?`<button class="mini-btn danger" onclick="clearCustomAccent()">Reset</button>`:""}
    </div>
    <div style="font-size:.76rem;color:var(--txt-faint);margin-top:8px;font-style:italic">Custom accent overrides the theme's default colour for highlights, borders, and buttons.</div>
    <div class="modal-actions"><button class="mini-btn go" onclick="document.getElementById('modalBg').classList.remove('open')">Done</button></div>`;
  mb.classList.add("open");
}
function selectTheme(id){
  _currentTheme=id;_customAccent=null;
  localStorage.setItem(THEME_KEY,id);localStorage.removeItem(ACCENT_KEY);
  applyTheme(id,null);
  // refresh swatch selection
  document.querySelectorAll(".theme-swatch").forEach(el=>el.classList.toggle("active",el.getAttribute("onclick")===`selectTheme('${id}')`));
  const picker=document.getElementById("accentPicker");
  const resetBtn=document.querySelector(".theme-custom-row .mini-btn.danger");
  if(picker)picker.value="#c9a24b";
  if(resetBtn)resetBtn.remove();
}
function previewAccent(hex){applyTheme(_currentTheme,hex);}
function applyCustomAccent(){
  const hex=document.getElementById("accentPicker")?.value;
  if(!hex)return;
  _customAccent=hex;localStorage.setItem(ACCENT_KEY,hex);
  applyTheme(_currentTheme,hex);toast("Accent colour saved");
  openThemeModal();
}
function clearCustomAccent(){
  _customAccent=null;localStorage.removeItem(ACCENT_KEY);
  applyTheme(_currentTheme,null);openThemeModal();
}
</script>
</body>
</html>
